body:
  text: 春秋提綱卷九宋陳則通撰雜例門春秋王室嗚呼吾於詩之二南而知雅頌之所以興吾於詩之二變雅而知春秋之所以作白華車舝瞻卬召旻之詩太任太姒之家法蕩然矣自古豈有家不正而天下定者邪詩述西周之盛自文王以下正始之基也春秋著東周之衰自平王以下返始之本也詩春秋之作此周之所以為東西者歟攷其盛衰之由明其得失之迹則齊家二字乃詩春秋之大綱領也春秋撥亂返始之書盖於隠公之元年三致意焉並后匹嫡春秋之戒也立子以貴不以長以長不以賢春秋之法也元年正月即位不書兄不宜讓而讓也鄭伯克段段不書弟弟不宜爭而爭也宰咺歸賵仲子不稱夫人而稱字妾不冝僭而僭者也一而再再而三獨拳拳於隠公初年之簡則元年以後之筆可知矣周治之正始無有過是者雖然有闗雎之后妃則有鵲巢之夫人周實不正於諸侯乎何誅攷春秋以来宋魯有公族之患齊晉有世卿之患當時之患無國無之二百四十二年間周室無他變特生於並后匹嫡之事耳平王之始於春秋也以此故敬王之終於春秋也亦以此故盖自檿弧箕服之謡起赫赫宗周誰實壊之申后失其尊世子失其嫡讀小弁之詩千載而下使人憤惋而不平也平王身及之而身為之上屈王宰下賵人妾不念伯服之於周而反啓桓公之於魯借曰既耄小弁之詩忘乎哉抑人亦有言前舟溺後舟不可繼桓王可以鑒之矣有世子之嫡有子儀之愛於是有周公黒肩之謀若無辛伯荘其危哉此桓王不鑒其父而貽禍其子者也荘王可以深鑒之矣有王姚之嬖有子頽之寵於是有五大夫之亂若無鄭虢恵其危哉此荘王不監其身而貽禍其孫者也嗚呼若恵王者可以痛念而疾懲之矣三折肱知為良醫何乃婦言是用從廢長立少之謀獨亂周室者二十年用是㑹于首止用是盟于洮用是出居于鄭若前乎無齊則襄不得立後乎無晉則襄不得歸此皆恵王不監於乃祖乃身而貽禍其子者也自幽之三年王昵褒姒至魯僖之二十四年襄入王城一百六十六年間周更七王大抵並后匹嫡禍亂相尋之日也襄王立蠻夷為天下之母居鄭之禍亦自取之止沸去薪曾不動念我文公之五年使召伯㑹葬使榮叔歸含且賵以成一成風之妾卒使敬嬴倣其事於他日則襄王實啓之也周不能已禍於周而每每駕其禍於魯可歎也夫自襄以後百一十餘年王室少事其間王子有専戮宣十五之罪而弗誅王弟無始禍襄三十之謀而見殺此皆天王不善於齊家之過至昭之二十有二年又踐恵襄之故歩而甚之者也穆后太子相繼即世東宫之器擁虚者八年於是動賔起之邪謀於是生子朝之禍心雄雞斷尾之喻王不許以言而許以意則天王之欲立子朝久矣特畏劉單諸人而不敢發也嗚呼恵襄以前皆事當其身而不悟乃欲責景王逺監百一十餘年之事亦難矣攷之王室更四大變皆以並后匹嫡之故外是周豈有他患哉父者子之天也夫者婦之天也春秋書王而冠以天父子夫婦之天且不正若臣若民之天将復奚恃哉然則春秋之書愧天子也或曰王室之禍莫酷於恵襄子頽子帶皆不見於經而子朝獨見於經何故曰恵襄之時有齊桓晉文在百子頽子帶輩無能為周室害也經不書恃天下之有伯也至景王以後晉少懦矣王室将聽命於陪臣矣徴㑹于諸侯曰期以明年㑹于黄父将納王也又曰期以明年卒使王室蠢蠢然至十有八年而後定聖人於此深以子朝為憂經書子朝悲天下之無伯也晉政多門紛紛之不暇而莫之主也春秋之書曰王室亂前乎桓文之伯所未見之文也吁豈特王室亂而已哉春秋書公嗚呼先王五等之爵紊亂而至於春秋極矣夫自夏商以前未聞也分土惟三建爵惟五其昉於武王崇徳報功之時乎然當是時受王命爵上公者有㡬唯是天子之老則稱公周室之客則稱公望太公也而為師旦周公也而為宰二公有大勲勞於王家世公之爵初不為過書稱齊侯吕伋詩稱乃命魯侯則吕伋禽父猶以其子不得世其爵況其後之曾若𤣥者乎春秋以前有衛武公者有鄭武公者縣外之諸侯入相天子者也春秋以後有祭公州公者有虞公宰周公者縣内之諸侯夾輔王室者也舍是無稱公者矣武王以胡公不滛使封諸陳以備三恪其後陳平為侯杞夏之餘也東樓公始封之君也其後子孫之見於春秋者自侯而書伯自伯而書子安在其為公也哉若陳若杞雖能身公爵於其初而不能世公爵於其後王賔且爾矧在諸侯春秋二百四十二年終始得稱公者惟宋為然盖以武王伐殷作周之故舍是而稱公者皆僭矣魯隠之父曰恵侯其正也入春秋之初年書曰宰咺来歸恵公仲子之賵縁此諸侯爵無尊卑國無大小例稱之曰公則息姑實俑之魯不特以不正之號加之父而又以不正之號加之祖自稱於諸侯則曰徼福於周公魯公周公魯公未聞其有此也齊又效尤之曰徼福於太公丁公太公丁公未聞其有此也獨晉仇生爵為侯歿諡為侯其後世之子孫循是而曰我先君文侯此意猶古文襄以下何不視此為的邪攷春秋七十二國之君不干先王之典禮不紊先王之封爵無得罪於春秋者獨蔡季桓十七忠於桓侯耳其他則聖人先卒以爵後葬以公其能逃一字之斧鉞哉吁天子若能守先王之法度則不至是吾觀虢公晉侯朝王王賜之玉五㲄馬二匹王命諸侯名位不同禮亦異數虢公也晉侯也而等是賜也諸侯象之其又何誅焉雖然諸侯之僭尚可言也鄭伯也而謂之公伯有其大夫也家臣或以公呼之矣大夫之僭不可言也吁先王封爵至於流弊之極尤有不忍言者蠢兹荆蠻謂諸侯無疑於公之號則已無疑於王之號入陳之舉哆然以諸侯縣公為辭則當時之諸侯苐班於荆楚之大夫爾抑人亦有言冠冕雖敝不可加足公爵雖輕不可加之荆楚之大夫吾不知息公子朱葉公諸梁蔡公弃疾彼何為者也王不為公而重其號卒亦不自重其號魯恵衛桓之於春秋天子不敢問則齊宣梁恵之於戰國亦無足怪者矣天下豈獨一荆楚乎東周之鼎㡬何不遷之于函秦乎然則如之何春秋之法正本澄源當自上者始魯婚姻例魯逆夫人夫人至桓三年公子翬如齊逆女夫人姜氏至自齊莊二十有四年公如齊逆女夫人姜氏入文四年逆婦姜于齊宣元年公子遂如齊逆女遂以夫人姜氏至自齊成十有四年叔孫僑如如齊逆女僑如以夫人婦姜至自齊内女歸于他國隠二年紀裂繻来逆女伯姬歸于紀七年叔姬歸于紀莊十有二年紀叔姬歸于酅僖十有五年季姬歸于鄫成九年伯姬歸于宋嗚呼男女親迎則授受明禮也唯萬乘之尊不容親屈於諸侯故使卿逆之公監之自王以下一是以逆為禮詩曰韓侯取妻蹶父之子韓侯迎止于蹶之里諸侯之迎者也俟我於著乎而俟我於庭乎而俟我於堂乎而大夫士之迎者也庶人工商皁𨽻牧圉有不以是者父母國人皆賤之也吾讀衛鄭諸國之風吾悲之嗚呼親迎之禮不明至此邪夫婦之道莫善於克終春秋之筆莫嚴於謹始書魯逆夫人者五獨於桓荘為詳所以志其亂魯之階於文公為略所以志其去魯之本齊侯不以桓公之篡而與之謀婚桓公不徃親受於齊而使賊以逆姜氏象之其又何誅焉禮有逆女無送女齊侯送姜氏于讙所以邀公之必来也經書公㑹齊侯于讙繼書姜氏至自齊設使齊君不送公必不㑹公之重在齊侯重不在逆女明矣始之不正終於何有哉荘公受制文姜必齊女而後取三十餘年未有内主公之求於齊也急而齊之應公也緩納幣使卿公實親徃春秋所以示譏逆女親者也春秋可以無貶然而如齊逆女公其知有桓公乎如則順而所如之國則逆逆之是而所逆之女則非經不書至而書入以國人有所不與也宗廟有所不受也魯君婚姻之事未有如桓莊之詳且悉者文繁而不厭聖人以是著魯禍之本歟以是為天下之大戒歟男不親迎不得以有室女不親迎不得以有家使大夫非禮也况㣲者乎文公斬焉衰經之中使襄仲如齊納幣識者知其忘先君矣又貴聘而賤逆不書夫人魯不待以夫人也姜不書氏齊不待以女也曰逆姜于齊則不知其為嫡為妾逆婦姜於齊始知其為伉儷貴為諸侯而婦不得稱夫人春秋所以嚴正始之辨後乎書至則曰夫人姜氏書歸則曰夫人姜氏終不與敬嬴得以代之也文公十八年之簡曰子卒夫人姜氏歸于齊數字淒涼為千古簡編之恨春秋安得不於逆婦之初而謹之乎書逆婦者三二有姑之詞也一賤逆之之詞也豈惟魯為然哉外諸侯之逆女自裂繻以來親迎之禮廢乆矣書紀伯姬悲之也書鄫季姬寵之也伯姬于宋三以媵書叔姬于紀兩以歸書賢之也外女書至視魯其家也内女書歸視諸侯其家也歸者所以依人以終身也然則杞叔姬郯伯姬齊子叔姬曷為又書歸乎吁知出姜之初不書至則知三姬之初不書歸魯蒐狩例桓四年春正月公狩于郎七年焚咸丘荘四年公及齊人狩于禚昭八年秋蒐于紅十有一年夏大蒐于比蒲二十有二年夏大蒐于昌間定十有三年夏大蒐于比蒲十有四年大蒐于比蒲哀十有四年春西狩獲麟嗚呼春秋兵制襄公以前未聞也至襄公而三軍之名作春秋蒐法昭公以前未聞也至昭公而大蒐之名立國之大事在祀與戎故諸侯嵗以三田為禮吾攷襄昭以来兵制壊而蒐狩之制壊魯之公室遂壊而不可復拯矣豈無故而然邪狩郎犯非地之戒狩禚忘不天之之仇罪之輕重不可以槩雖然斯時也蒐狩之制未壊也按僖公之頌公徒三萬其人公車千乗其賦即位三十餘年豈蒐狩之禮未甞一講春秋不書大抵得時與地之故成公以後非三家不帥師此乃兵權旁落之漸三軍魯之舊制襄十一年書作三軍者版籍缺落三家各毁以充三軍之數昔為公室有今為三家有春秋書作不宜作也斯時公室三矣而猶未也昭之五年舍中軍季氏擇二二子各一公室於是乎四紅之蒐舍中軍之三年也自根牟至于商衛革車千乗不知誰為公室之民乎自後三蒐比蒲一蒐昌間俱以大名夫大蒐天子之法也而夏官司馬之司也魯兵制壊而蒐狩之制壊三家之僭且及此矣豈特失時與地之為可譏哉春秋於桓荘之狩言公而昭定以後不言公公不與蒐也定之十四年公雖在蒐猶無公也公不與蒐國不顧君西狩大野叔孫氏之賤者且獲其非常矣春秋安得不止於獲麟魯祭祀例郊望郊牛附僖三十有一年夏四月四卜郊不從乃免牲猶三望宣三年郊牛之口傷改卜牛牛死乃不郊猶三望成七年鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛不郊猶三望十年夏四月五卜郊不從乃不郊十有七年九月辛丑用郊襄七年夏四月三卜郊不從乃免牲十有一年夏四月四卜郊不從乃不郊定十有五年鼷鼠食郊牛牛死改卜牛夏五月辛亥郊哀元年鼷䑕食郊牛改卜牛夏四月辛巳郊嗚呼天子不卜郊魯卜郊何也魯人上僭天子之禮每郊必卜于上帝吉則郊不吉則否卜之者其魯人以僭禮之為疑乎凡卜不過三過三而卜則失其度郊不過春過春而卜郊則失其時冬至之日郊天子之禮也魯不敢用日至而但用啓蟄十二月之下辛卜正月之上辛不從則以正月之下辛卜二月之上辛不從則以二月之下辛卜三月之上辛又如是則不郊矣春秋不書春卜郊者自日至以至於啓蟄以後皆郊之時也僖公四月之四卜襄公四月之四卜其過在於三月不從而猶卜也成公五卜則甚矣襄公七年四月三卜郊是卜之後時至四月而始三卜也子公羊子以三卜為禮豈知春秋書三卜之後時而非禮與恵公請行郊禮以来遲疑顧盼不敢直情而徑行之禮之将用則卜卜而不從則不郊至成十七年之九月經書用郊則郊不復卜而直用之矣定公五月之辛亥郊哀公四月之辛巳郊不卜而郊母乃以先君成公藉口不思郊不過春為祈榖祭帝耳夏而種秋而斂将焉用此哉經書不郊猶三望可也三家之傳諸儒之註莫有據依余甞論天子郊天則百神從山川星辰之神莫不在也天子不能親至其所而祭故有望焉三云者緫山川星辰之神而言之也有天下者祭百神魯安得用此禮乎郊者僭禮之大者也魯既免於僭禮之大而猶未免於僭禮之小聖人以為不如勿望而已矣此春秋書猶之意也然則郊之得其時而卜之得其度其為禮乎曰春秋書之不可勝書惟於失禮之中而又失禮焉則書之果以為禮乎夫子何以有周公其衰之歎郊牛嗚呼古者諸侯必有飬獸之官嵗時齋戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後飬之朔月月半君廵牲所以致力孝之至也春秋書鼷鼠食郊牛角猶可曰有司之過也改卜牛而又食其角則非人也天也郊牛之口傷則無鼷鼠而自傷也改卜牛而牛又死豈人之所能為哉春秋書卜郊而屢不從書改牛而又食天其不享魯僭乎鼷鼠食郊牛角祗食其角耳口傷祗傷其口耳食郊牛不言其所食之處則徧牛之身皆食也牛死則如之何曰埋之牛免則如之何曰有司𤣥端送於南郊而放之然則春秋或書免牛或書免牲何也曰卜而飬之曰牛飬成而将用之曰牲曰免牲是不郊也牲已可用而免之也故不曰不郊但曰免牲曰免牛而又曰不郊者牛未可用而免之也故既曰免牛而又曰不郊春秋一字之權衡其可輕易乎哉吾故備郊牛之説而寘之魯郊之次魯禘例閔二年夏五月乙酉吉禘于荘公僖八年秋七月禘于太廟用致夫人嗚呼禮不王不禘天子立始祖之廟推本始祖之所自出者而祀之而以其祖配之此之謂禘諸侯不敢祖天子而以其始封為祖故禘不及諸侯也周有二祖太祖文王始祖后稷稷之所自出者嚳也文王配帝於明堂稷配天於郊嚳禘於太廟周制也東遷以来諸侯率以天子為祖宋祖帝乙鄭祖厲王衞蒯瞶亦曰太祖文王烈祖康叔文祖襄公亳城北之盟亦曰先王先公七姓十二國之祖諸侯之僭盖不獨一魯矣晉人曰以寡君之未禘祀此禮豈獨罪魯邪魯有二禘有常禘有三年之喪畢而禘春秋書之則不勝書唯禮之重失則書之閔二年之禘則譏其未喪畢而服吉也先君之几筵猶在於寝未可以稱宫廟也僖八年之禘則譏成風将為夫人舉先君之衆妾母而悉致之廟也若祗以禘為失禮則春秋不書矣程子曰天子禘諸侯祫大夫薦庶人享魯有祫祭而春秋不書祫何也曰諸侯之事無大於祫大事即祫祭也有事即常祭也春秋書大事則祭無大於此矣聖人以是明郊禘之僭歟自閔公亟行是於荘公自是羣公之廟徃徃用此朱干玉戚以舞大夏八佾以舞大武三家象之其又何誅焉禘于襄公萬者二人盖春秋所不忍言也若夫禘于僖公順祀先公而祈焉吾不知誰為之誰為之魯雩例桓五年秋大雩僖十有一年秋八月大雩十有三年秋九月大雩成三年秋大雩七年冬大雩襄五年秋大雩八年秋九月大雩十有六年秋大雩十有七年九月大雩二十有八年秋八月大雩昭三年八月大雩六年秋九月大雩八年秋大雩十有六年九月大雩二十有四年秋八月大雩二十有五年秋七月上辛大雩季辛又雩定元年九月大雩七年秋大雩九月大雩十有二年秋大雩嗚呼魯之雩其有二乎有常雩有旱雩建巳之月蒼龍之宿昬見于東方是時舉雩禮以祭之祈百榖仰膏兩也若乃旱而雩則因旱而後雩也雩而雨則但曰雩雩而不兩或旱而不雩則始曰旱經無建巳之月書雩者其魯之常祭歟或一年而兩雩或一月而又雩者其旱甚歟然則雩以大書何也天子之雩主上帝諸侯之雩主山川星辰春秋書大雩則魯人僭天子之禮而雩上帝矣然則成王賜魯以天子之禮樂母乃是歟曰誰為是言若吾夫子之言則信若吾夫子之言則信魯土田例隠八年鄭伯使宛来歸祊庚寅我入祊桓元年鄭伯以璧假許田僖三十一年春取濟西田宣元年六月齊人取濟西田十年齊人歸我濟西田成二年取汶陽田八年春晉侯使韓穿来言汶陽之田歸之于齊襄十有九年取邾田自漷水昭元年叔弓帥師疆鄆田二十有五年齊侯取鄆定十年夏齊人来歸鄆讙龜隂田哀二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田八年夏齊人取讙及闡冬十有二月齊人歸讙及闡嗚呼隠桓之初諸侯其猶有王室乎鄭荘以詐力行乎諸侯専盟専伐冝不王室是顧行一不義則歉然有不能自安之心未甞的為之名正為之辭深自諱晦以盖其不義之舉雖天資之巧詐過人亦者所顧忌不敢直情而徑行之也許田於魯為朝宿之地祊於鄭為湯沐之邑舊矣鄭荘之請以祊易許田則隠公之八年也我既入祊而不與鄭以許田鄭人不急不迫未甞有辭於我者四年以周公之原廟在彼魯人重以與之而鄭人亦重以請之也桓公以篡得國求寵於諸侯寤生藉此為取許田之隙不獨以祊而以璧繼之不敢以請而以假名之假云者其殆鄭荘歉然不能自安之心乎是時周室雖卑主用猶在一旦明天子復行巡狩朝覲之禮祊魯不得而有而許田鄭亦不得而有也我不曰假魯将以王室為辭嗚呼假之名其起於此乎諸侯猶知畏王室者乎春秋循是而書曰鄭伯以璧假許田兾其王室復行巡狩朝覲之禮也繻葛一敗不可収拾天子亦聽諸侯之不復朝覲矣夫諸侯之寳三土地為上不敢以尺寸取諸人亦不敢以尺寸予諸人春秋凡魯取邑則書以貪人之有為罪取魯邑則不書以失地為宗廟之大辱也故内不書叛必書圍所以見其叛外不書取必書歸所以見其取取不書歸必有故然後言其取不以尺寸予諸人者也外邑来歸則我書入以言其逆已邑来歸則我不書入以見其順不以尺寸取諸人者也嗚呼取必無歸春秋書歸以幸之假必有歸僖公居常與許復周公之宇其諸許田之歸于我歟春秋不書其諸書假則不必書歸歟魯公受之至桓公而棄之春秋所以著其罪桓公棄之至僖公而復之詩頌所以嘉其功所可惜者周為天下共主聽諸侯土田之自棄自復而莫之能治也聖人望周之意缺然也異時鄆田之爭使劉單二子訟于晉閻田之争執甘大夫襄以謝于晉周尚如此何以庇諸侯哉吁安得韓穿一言而汶陽之田不歸于齊魯城築例隠七年夏城中丘九年夏城郎桓五年夏城祝丘十有六年冬城向荘二十有八年冬築郿二十有九年冬十有二月城諸及防三十有一年春築臺于郎夏四月築臺于薛秋築臺于秦三十有二年春城小榖左氏云為管仲范氏云魯西北有小榖城文七年春遂城郚十有二年冬季孫行父帥師城諸及鄆宣八年冬城平陽成四年冬城鄆九年冬城中城十有八年秋築鹿囿襄九年夏城費十有三年冬城防十有五年夏季孫宿叔孫豹帥師城成郛十有九年冬城西郛城武城昭九年冬築郎囿定六年冬城中城十有三年夏築蛇淵囿十有四年城莒父及霄此年無冬哀三年季孫斯叔孫州仇帥師城啓陽四年夏城西郛五年春城毗六年春城邾瑕嗚呼春秋内書城者二十有二其皆譏之乎大都三國之一中五之一小九之一先王之制也龍見而戒事火見而致用水昬正而栽日至而畢先王之時也春秋非以其不時書則以其過制書得時與制而猶書之者所以重民力也夫先王建國諸侯受封之初皆有城郭以域其民豈必春秋而後為城築計嵗月以乆之風雨以頽之干戈矢石以馮陵之時葺其不完以為民備猶有先王之時與制在若乃凶年而城凶年而邑尤春秋之所大戒一年而屢役一役而兩城君子以為用民力之為已悉矣城而帥師某冦将至不曰牖户綢繆迨天之未隂雨邪興城造邑猶恐勞民築臺築囿何以為役攷十二公之行事獨僖公不興一城築不造一臺囿不敢輕用民力南門才一興役而仲尼之筆已繼於梁亡之後此春秋責備賢者之深意也抑吾讀春秋而有懼焉城郭之制此公侯所以扞城其民春秋以後皆大夫之私城其邑古者家不蔵甲邑無百雉之城本大末小是以能固其民而無爭心叔仲謂南遺多與而役以城費後来圍費墮費公室一大勞動季孫叔孫帥師城成郛至圍成之役定公親徃竟不得墮防臧氏之邑乃大城之卒使武仲得以防要君而求後於魯武仲且爾又何議乎他成公以後魯多叛邑非末大不掉之弊耶櫟人知有子元而不知有鄭曲沃知有欒氏而不知有晉是假冦以兵而齎盗以糧耳故大城國之害也國不可無城城不可無民民不可無吏有社稷人民者盍于此乎念豈一城一邑所能係其成敗存亡之數也哉春秋提綱卷九
