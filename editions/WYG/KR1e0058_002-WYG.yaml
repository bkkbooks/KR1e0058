body:
  text: 春秋提綱卷二宋陳則通撰侵伐門晉鄭楚伐許例荘二十有九年鄭人侵許僖六年楚人圍許諸侯遂救許二十有八年諸侯遂圍許二十有九年公至自圍許三十有三年晉人陳人鄭人伐許成三年鄭公子棄疾帥師伐許鄭伐許四年鄭伯伐許十有四年鄭公子喜帥師伐許襄三年晉荀罃帥師伐許十有六年叔老㑹鄭伯晉荀偃衛甯殖宋人伐許定六年鄭游速帥師滅許以許男斯歸嗚呼王澤竭伯功淺小國從楚豈獲已哉議者切齒諸侯之從楚蔡為上許次之陳又次之鄭人遨逰南北之間者也予謂陳蔡鄭之所畏者惟楚許不惟畏楚而又畏鄭故許人始役役於齊終役役於楚多方以圖免者惟鄭人之故齊之勢力足以及許許不甘心於楚而事齊晉之勢力不足以有許許始甘心於楚而倍晉越鄭謀許晉人所難鄭若来伐晉未必救楚大而近足以威鄭且庇許矣抑人亦有言鹿死不擇音許惟强可以庇民者是從何擇其晉與楚哉吾攷鄭人仇許之事盖自桓公之十有五年始前此十有五年太岳之祀不絶如綫不遷其重器不係累其子弟存許以俟其他日則鄭荘之力也寤生云亡忽突爭國何暇以一許為問許荘無子穆公托兄死弟及之名不告於天王於方伯於鄭直入許而為之君經書入不順之詞也不與其乘人之約以為利也自此鄭與許仇卒為世世不釋之憾許之自為謀亦危矣齊桓創伯逺足以来江黄寧不足以得一許七從㑹盟三從征伐許最有奬齊之功鄭欲有事於許未免猶畏於齊於荘之二十九年潛師侵許以脩舊怨猶不敢聲許之辠而討之也齊之勢力足以庇許彼楚人憑恃其衆而必許之從楚豈許之所甘心哉櫬璧之事傳近於誣盟洮以後猶有許男按經可以見許之不從楚矣盂之役楚以子書許亦在㑹則齊桓没之四年也自後憑陵諸夏楚来而許助之晉文三㑹諸侯而朝王所許於踐土河陽不為不近惜不能自拔於荆蠻之中䧟溺之為最深耳文公率㑹温之諸侯乘勝圍許宜若振槁然圍而不舉豈其力不足而心不忍耶不欲甚楚人之怒而置之也襄公不忘前怨偕陳鄭以伐竟以無功返則晉人謀許之意怠矣救鄭之役新城之㑹晉人聽許之自北二扈等盟許又不至晉人聽許之自南僖公三十有三年以後晉不復加兵於許者五十有六年君臣朝夕謀陳謀鄭且不暇安有餘力以及許耶直至雞澤之盟鄭人服而陳亦来始敢興師以問許荀罃伐於襄公之三年荀偃伐於襄公之十有六年晉人得鄭始敢問許也許公之謀國亦曰吾邇楚而逺晉許若從晉未必釋鄭人之憾反以召楚人之怨萬一楚伐其外鄭應其内許國之危朝露矣故從楚可以免禍於楚亦可以免禍於鄭鄭人從伯討以後畏楚不敢發者三十有八年謂許人之見重於楚也陽橋之役靈公為右於蜀之盟許人不書鄭人始知許之不見重於楚成之三年姑使子良伐許以甞楚之救與否也一伐而不救則再再伐而不救則三冐衰絰以興戎不恤也卒使鄭許交訟不之晉而之楚子反何人乃攝士官而聽其詞諸侯之無霸害哉成十有四年子罕来伐不得叔申之封不止也襄公之十有六年諸侯之伐許皆以大夫行鄭獨以國君會夫兵莫慘於志鏌鎁為下春秋書之曰叔老㑹鄭伯晉荀偃衛甯殖宋人伐許忍矣哉鄭伯之為此行也許男平昔恃楚臨鄭之謀卒於無成為鄭人笑是用痛心疾首告於楚庭以請伐鄭曰師不興孤不歸矣此時之為此言可憐哉一旦楚有亡郢之釁鄭遂有滅許之師墟人宗社辠無所逃春秋嘗因許而狄鄭矣於滅國夫何誅雖然楚不為無辠也鄭人本不敢興伐許之師為楚不救耳遷葉不能免則遷於夷夷不能免則遷於白羽白羽之患如初則又遷之容城凡四遷許之勞不如一救許之力黔驢之技止於此鄭不滅許何為哉紀恃魯而悮於魯黄恃齊而悮於齊許恃楚而悮於楚此可為恃人而人不足恃者之戒也或曰鄭許紛紛之訟子何以折之許曰予舊國也鄭曰予俘邑也當以左氏之言為案春秋之初書曰鄭伯入許春秋之終書曰鄭游速帥師滅許當以仲尼之筆為斷予請為之辭曰滅許之辠在鄭誤許之辠在楚恃楚不事鄭之辠在許聽鄭人滅許之辠在晉齊伐楚例僖四年公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘楚屈完来盟于師盟于召陵嗚呼此一役也齊侯二十餘年之智慮所及春秋二百四十二年侵伐之所無論五伯者嘐嘐然曰桓公曰桓公其在此乎然則侵蔡伐楚書遂者何蔡自北杏以後不與㑹盟聲兵問辠蔡其何辭何必濳師而為侵荆自敗蔡以後屢為不道正名定辠楚當首師何必先蔡而後伐吁不然陳蔡鄭許密邇荆蠻蔡居汝水之南實為楚人門戸之蔽召陵之役陳從則宛丘之道通許從則許昌之援集鄭從則虎牢之關未閉獨蔡之即楚為齊師南北之擾吾將聲兵討蔡楚必救之救兵具至吾不下蔡何及於楚不若輕兵以侵之蔡人倉卒聞諸侯之至不暇告楚而奔潰不可復支矣蔡道既通遂事南伐楚楚人亦不虞君之渉吾地也况楚人憑陵中國三十餘年諸侯莫敢南向而誰何一旦聞蔡潰而及已倉皇四顧欲守險則陘者先君蚡冒建國之地已為諸侯有欲戰則狼顧恐江黄之議其後所以有屈完之如師與經書侵而遂伐神速而不留也伐而書次持重而不廹也来盟於師盟於召陵克敵而不驕也吁此固齊侯莭制之師而管仲教之也晉楚兵爭例僖二十有八年春晉侯侵曹晉侯伐衛楚人救衛晉侯入曹執曹伯畀宋人夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績嗚呼召陵以前齊師之伐例稱人至召陵而齊君始爵召陵以前㑹齊師之伐例不過二國至召陵而八國始同役二十餘年養威持重輕兵薄賦以寛民力一旦問楚力有餘而氣倍之楚人懼不敢動此召陵之偉績也予嘗論桓公中才之主無管仲則繩墨放管仲霸者之佐無桓公則他人不能用不及時謀楚且寛為二十五年規模以治之俟河之清人夀㡬何設桓公管仲有一不幸若楚何哉顧公之心未嘗忘楚苐内安諸夏外攘夷狄二十五年之久猶不覺其怱遽也盖諸侯不安則楚不可圖桓公所以先合諸侯而後伐楚楚人不退則諸侯不服文公所以先與楚戰而後合諸侯桓公没諸侯苦楚之暴久矣盂之執諸侯不敢問泓之戰宋人不能當伐齊圍陳暴骨如莽又合四國之師環宋城下而圍之是時也其間或有强有力者出與楚戰諸侯不欣欣然視之如歸乎况城濮之役晉楚雌雄未戰先定楚師連年暴露民不獲息肩不足以當秦晉方銳之氣子玉剛而無禮志驕氣盈不足以敵齊宋必死之鋒以驕將御疲兵多愈見其敗楚子少與之師而欲與四大國相馳驅其勢不大懸絶耶吾諒晉人惟恐楚人之不戰也多方以怒楚始則輕兵侵曹以示楚之緩繼則重兵伐衛以聲楚之急楚人救衛果墮其謀晉遂卷甲疾趨入曹而執其君矣楚人徬徨顧盼不知所為謂晉侯已侵曹矣不知伐衛之又晉侯也謂其已伐衛矣不知入曹之又晉侯也春秋屢挈晉侯文繁而不厭或者賞晉侯之功而又辠晉侯之譎與執曹畀宋楚怒已甚宛春見辱誰能堪之然後退師三舎陽以報楚子之惠隂以示子玉之怯而鬭勃之請戰必矣以四大國之師而萃其一軍其畏不敗乎此一役也楚人請戰晉侯書及春秋誅意之筆也嗚呼齊桓屢盟屢㑹而後為召陵之役既得諸侯而後伐楚也晉文一戰勝楚而後為踐土河陽之㑹既勝楚而後得諸侯也非其時異而事不同耶然則以時而論則桓公之創伯難文公之繼伯易以事論則桓公之成功遲文公之見效速以心術論則桓公正而不譎文公譎而不正晉伐齊例宣十有八年晉侯衛世子臧伐齊成二年季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績齊侯使國佐如師及國佐盟于袁婁襄十有八年公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊十有九年晉士匄帥師侵齊聞齊侯卒乃還哀十年晉趙鞅帥師侵齊嗚呼隠桓之世天下之强國二荘僖之世天下之强國四成襄以後天下之强國六設呉越不死戰國之稱雄者不知其㡬予讀春秋而悲天下之為戰國久矣秦楚呉越俱不足論攷齊晉兵交之由而知中國之兩强不相立也齊桓之子孫雖不足以繼伯而毎毎不平於晉晉文之子孫雖號為繼伯而亦不敢責備於齊齊桓伯業已積漸於僖公小伯之時其行事之規模與收伯之功烈大非僖公之所可望南伐强楚北伐山戎西㑹葵丘東㑹於淮三十餘年之經營天下者略徧獨晉人盟㑹所不及征伐所不加執虞滅虢此誰之辠略不以一矢相加遺何耶諸侯固避晉之强也孝公銜取穀之怨合晉師以却楚豈料城濮一勝晉伯遂成踐土翟泉兩㑹偕来吾諒齊人本心必有勉强不獲已者矣我伯國之餘也縱自輕奈辱先君何自後晉人大盟大㑹齊君大夫不復從者四十有六年齊人不道虐執天子之使辱我叔姬憑陵我西鄙魯人兩告於晉晉不一問於齊晉之視齊猶向也齊之視晉也齊惠結魯以抗晉魯宣舎晉而事齊天下㡬有兩伯郤克使齊齊晉之憾始開斷道一盟齊魯之交始散一笑興師生靈何辠春秋書七大夫戰一齊侯鞌之敗吾不為齊侯羞為列國之諸侯羞也齊以師徒撓敗之餘少殺其勢俯首帖耳於蟲牢馬陵之盟自是以後黽勉聽命豈其本心戚之役以國佐至朾之役以崔杼㑹晉亦喜於得齊何暇屑屑計此哉悼公五㑹三駕諸侯親徃齊獨以世子當之晉亦苟焉不敢為責備之語光列於諸侯卒使齊人得以藉口盖其平日憤憤不平之心不欲晉伯勢力不至不得不来悼公末年伯心稍倦則有我北鄙之伐平公新立溴梁之盟髙厚已有異志矣十有七年君伐我而圍桃臣伐我而圍防非以弱魯正以陵晉平公合十二諸侯環其城下而攻之經書同圍盖仲尼特筆之文以著齊環不道之辠也繼是澶淵商任沙随等㑹荘公又親辱於諸侯矣雖然齊猶未也以勢力强大之齊而役役於地醜徳齊之晉豈其甘心哉沙随之明年伐衛伐晉以報東閭之役入孟門登太行張武軍於熒庭生平脩怨之志始快攷春秋自非秦晉世世之讎誰敢執戈而與晉角晉人曰晉楚齊秦匹也楚人曰釋齊秦他國請相見宋之盟戰國之兆也嘗記景公如晉飲酒投壺晉人已有齊君弱吾君歸弗来矣之言至召陵侵楚以後諸侯相顧莫敢先叛齊及鄭盟於醎及衛盟於沙又及魯盟於夾谷率衛侯次於五氏於垂葭以伐晉而諸侯遂無伯矣嗚呼諸侯之有伯固非王室之幸諸侯之無伯又豈世道之福春秋於五氏垂葭之役不書伐而書次聖人重絶晉之文也晉國將分莫適為主至哀公十年趙鞅始帥師侵齊以報之亦足以見公室之大弱晉固失伯景公輕躁如此豈得為諸侯盟主哉徒以促天下之無伯而春秋終焉且夫齊國之大不減於晉晉文之盛不及桓公後世子孫惟悼公稍有聲績其餘齊晉數君不大相逺晉獨得以世伯者大扺其國以教訓奬拔風俗人才世出欒郤胥原狐續慶伯韓范趙魏之徒支持伯業與春秋相為終始此亦晉人深憂逺思之意以齊桓之事為覆轍也桓公有管仲而無繼所以無世伯之資景公有晏子而不用所以無復伯之績孰謂區區伯業而可無人為之乎詩云人之云亡邦國殄瘁齊桓其有焉其車既載乃棄爾輔景公其有焉詒厥孫謀以燕翼子晉文其有焉秦晉兵爭例僖十有五年晉侯及秦伯戰于韓獲晉侯韓原河西之地三十有三年晉人及姜戎敗秦于殽函闗之地文二年晉侯及秦師戰于彭衙秦師敗績彭衙河西之地杜云馮翊郃陽縣西北有彭衙城冬晉人宋人陳人鄭人伐秦不書地三年秦人伐晉傳云取王官及郊杜云皆晉地王官在河東四年晉侯伐秦傳云圍邧新城杜云秦邑按邧新城在河西七年晉人及秦人戰于令狐傳云敗秦師於令狐至於刳首杜云令狐在河東與刳首相接十年秦伐晉傳云春晉伐秦取少梁按地在河西杜云在馮翊夏陽縣傳又云夏秦伯伐晉取北徵按地在河西杜云縣屬馮翊十有二年晉人秦人戰于河曲按地在河東其縣實蒲坂之南宣元年晉趙穿帥師侵崇秦與國二年秦師伐晉傳云遂圍焦杜云晉河外邑八年晉師白狄伐秦不書地無傳十有五年秦人伐晉傳云次於輔氏杜云晉地按地在河外成九年秦人白狄伐晉傳云諸侯貳故也不書地十有三年公自京師遂㑹晉侯齊侯宋公衛侯鄭伯邾人滕人伐秦傳云戰於麻隧按地在河外襄十年晉師伐秦傳云報其侵也不書地十有一年秦人伐晉傳云濟自輔氏杜云自輔氏渡河在河外十有四年叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦傳云及涇不濟按涇水出安定至京兆髙陸縣入渭嗚呼秦之先其得為諸侯乎車鄰一詩美秦仲也以字配國無爵命之稱不過春秋邾儀父蕭叔之類然秦之强大實始於此有車馬禮樂侍御之好焉已欲漸進於諸侯矣然而猶未也襄公將兵平戎取岐豐之地受顯服駟鐡之詩有曰公之媚子從公于狩國人始尊之曰公終南之詩曰顔如渥丹其君也哉國人始呼之曰君又且矜其車甲以討西戎駸駸為西方之强矣然而猶未也盟㑹不同聘問不通春秋七十有五年未有以秦事見經者方是時天下惟齊楚為强而晉亦未之聞也至僖公十有五年書曰晉侯及秦伯戰於韓增天下之强國而四此春秋之降而戰國之萌也歟是役也秦伯首戎晉侯書及春秋以晉侯之志為此戰也獲晉侯若匹夫然吾甚為諸夏羞前此春秋秦晉略之一旦以夷狄獲諸夏之君其威足以動天下矣是年晉侯歸不書春秋不予夷狄專廢置之權也首納夷吾齊桓猶在繼納重耳穆公已有霸視諸侯之心豈料城濮一勝晉執牛耳穆公已有憤憤不平之志與晉周旋一無所得大恩易怨人情之常春秋於圍鄭之役晉文貶而人之秦穆貶而人之志二國兵爭自此始矣晉文艱難險阻十有九年穆公畏晉猶隠忍而不敢發襄公新立未免以童稚目之不聽蹇叔千里伐人襄公出其不意衰絰即戎要諸殽而敗之穆公始謂晉文不死矣殽陵悔過若不自容奈何秦誓猶新遂為彭衙拜賜之師晉師才報是冬晉人伐秦又為濟河焚舟之役言出自口而又食之皆其不能懲忿窒欲之過至文公四年晉侯伐秦秦伯始踐誓言斂兵不報春秋以是髙穆公也康公不顧晉甥之愛納不正以伐其喪趙盾不顧先蔑之請不謝秦而與之戰春秋於令狐之役兩責之康公不悛又興忿兵以伐晉文之十年春秋於是再狄秦矣河曲以後俱無足論但晉自失伯秦亦不競十有六年楚人秦人滅庸兩雄始為犄角之勢楚雄於南與晉抗伯秦强於西以為楚援自是秦之伐晉者四盖以分晉人治楚之師晉之伐秦者乍勝乍負無大得志焉爾春秋深惡二國之爭韓原之戰猶舉秦爵戰殽以後凡將無君大夫皆書人者春秋所以狄秦也僖之三十有三年書曰晉人及姜戎敗秦於殽晉猶自别於姜戎宣之八年書曰晉師白狄伐秦晉卒無别於白狄春秋所以狄晉也二國兵爭六十有九年直至襄公十有四年伐秦之役二國兵爭之文始絶晉尚有志於諸侯秦人不復濟河而東矣傳載秦哀公救郢却呉惟此一事外未聞加兵於諸侯閉闗不出務農訓兵坐以待天下之釁其為志豈淺淺耶他時囊括天下之規模已在此矣盖嘗讀書至此覘秦人之用心非諸侯及也且夫未有秦風以前秦猶附庸之微也秦風數詩詳著秦室始大所以列為諸侯之始未有秦誓以前秦猶諸侯之雄也秦誓一篇深許穆公悔過所以進為王道之漸詩以諸侯許之書以王道許之春秋兩以國挈秦者所以惜其終為異俗之歸春秋非固以異俗待秦者岐豐之地猶有先王之遺民焉襄公一以勇力驅之慷慨激烈忘生輕死讀脩我甲兵與子偕行之詩令人壯而悲之夫周自后稷公劉世世積徳至武王而有天下秦自秦仲襄公世世積威至始皇而有天下計其脩短亦積徳積威之所致也嗚呼春秋之晉至戰國而分為三三晉至始皇而合為一不特為三晉歎可為諸侯歎不特為諸侯歎可為一周歎秦之亡抑不足歎也已闗曰焦曰瑕曰華隂曰華陽曰桃林曰桑田皆在闗之左右者也秦師之由陸常必由之所謂殽有二陵乃函谷之間也按地理其闗東接澠池西連華嶽北濱河渭南鄰西虢自東陵至西陵凡三十五里東則峻阜絶澗車不得方軌西則石坂十有二里險絶不異於東殽此天之所以限雍豫之地河曰溼曰沂曰麻隧曰刳首曰令狐曰桑泉皆在河之左右者也秦師之汎舟之役必由之按其地理河之西謂之龍門西河而涇屬渭汭之水入焉河之東謂之大原岳陽而覃懐衡漳之水入焉其西有韓原有少梁城有莘城有北徴有邧新城皆近於彭衙者其東如晉陽如厯山如涑川如王官如解梁城皆依於河曲者河水瀰瀰一𣲖自北而南此天所以限冀雍之地彭衙昔文王親迎於莘在洽之陽即此彭衙之地秦師自雍以伐河西凡七百餘里而至彭衙按地屬郃陽縣西北有城河曲昔成湯伐桀升自陑即此河曲之南按地屬蒲坂縣之南秦師自雍以伐河東凡六百五十餘里而至河曲春秋提綱卷二
