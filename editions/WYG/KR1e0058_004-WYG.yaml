body:
  text: 春秋提綱卷四宋陳則通撰侵伐門魯莒兵爭例僖元年公子友帥師敗莒師於酈獲莒拏宣四年公伐莒取向十有一年公孫歸父㑹齊人伐莒襄八年莒人伐我東鄙十年莒人伐我東鄙十有二年莒人伐我東鄙圍台季孫宿帥師救台遂入鄆十有四年莒人侵我東鄙昭五年叔弓帥師敗莒師於蚡泉十年季孫意如叔弓仲孫貜帥師伐莒嗚呼春秋二百四十餘年之兵爭非聖人所願聞也非有呉楚之僭竊非有要荒之强暴上闗乎王室下闗乎世道者當引諸侯之師一大治之使屈服乃止若諸侯疆場之事當遣一介以讓之不則告方伯以正之又不從則方伯告於天王以討之諸侯之自為國者其亦曰小事大大字小而已其亦曰完其守備以待不虞而已而况堂堂周公伯禽之魯諸侯之望雖齊晉不及也焉用自播揚焉下與邾莒為尋常之爭顧不可羞耶予嘗論惟貪功之君以服小國為美名惟專權之臣以取小國為實利名未必可取利未必可得其自辱多矣莒子之諡號與其臣之名氏不登於春秋之版微之也春秋之初未有書諸侯之入人國者而入國自莒始隠二年未有書諸侯之伐國取邑者而取邑自莒始隠四年天王不問方伯不討循致其强浮來隠八年曲池桓十二年之盟魯人甘心焉雖然以其盟猶愈於爭無傷也莒以慶父之故求賂乎魯魯若修文告以却之何患無辭季友帥師敗之酈獲莒拏而俘之此皆非王者之師仁義之舉徒以舉二國之兵釁而已以莒人負恃其强然猶二十八年不敢逞尺寸之憾於魯者以齊宋之伯迭興而魯亦大國未可動也迨僖公二十有五年衛人始平莒於我洮之盟魯人以為莒卿也而不足明年向之盟僖二十六年必得莒君而後已魯人之汲汲於莒亦非樂為此者升陘之役僖二十二年南已喪師於邾不欲東結怨於莒更生一敵以為魯患也之二盟也其亦僖公不獲已而就之耶雖然以其盟猶愈於爭無傷也自後魯莒得以少事者三十有二年未必非衛侯一執牛耳之力宣公不繼前好以親仁善鄰莒郯有釁當敬行其禮道以文辭釋二國之憾而鳩其民君苟有信於齊乎何頼春秋書公及齊侯亦有挾大淩小之意不書莒及郯平而書平莒及郯宣四年又見要盟無禮之辠公之心初以二小國為公耳平而不得則怒怒而不已則兵於是伐國取邑之事随之是魯本欲釋郯莒之憾反不能釋魯之憾無他貪功好名之志有餘而大公無私之道不足也不七年歸父㑹齊人伐莒豈怒莒未怠猶至此耶我成公七年公孫嬰齊如莒弃惡同好以幸東鄙之無事莒亦畏我大國退焉聽命而不敢較盖自襄六年莒人滅鄫臧紇救鄫敗諸駘莒人遂謂我之不能師也稱兵以伐我者三襄八年十年十二年潛師以掠境者一襄十四年蕞爾小國襄公以前猶未至此寧非侏儒喪師以辱社稷有以來之乎魯君飭疆吏以備其不虞遣行人以告之大國如是足矣季孫不忍忿怒之心於十有二年莒人圍台之役救台遂入鄆盖亦怒蹊田而奪之牛者夫伐國圍邑固春秋小國之所未嘗受命救台不受命而入鄆亦春秋臣子之所不敢春秋之義寧可無邑不可無君救者之辠猶有甚於伐者之辠矣莒人為是報入鄆之役干戈相尋直至二十年仲孫速㑹莒盟於向二國始懲其忿以相宥也魯又不祥背棄盟誓莒人有密州之禍季孫有取鄆之師鄆利於季孫而不利於叔孫也設微趙孟之請則見戮於會誰實使之又五年季孫受牟夷之邑叔弓敗蚡泉之師牟夷利於季孫而不利於公也設微范宣子之言則見執於晉誰實為之季孫專利不顧上不君其君下不親其親何暇顧一莒而不以為利哉愚按魯莒之爭不過向鄆二邑當隠公之二年莒入向桓公之十有六年我城向向猶有爭也宣公乘郯莒之怨也而取之向於是偏屬於魯當文公十有二年城諸及鄆襄公十有二年救台遂入鄆鄆猶有爭也至昭公之元年乘密州之禍也而取之鄆於是偏屬於魯取向取鄆外復何求昭公十年季孫又伐莒而取之郠小人之腹其有屬厭乎莒人愬晉平丘之執辠足以當季孫之身惜夫晉人不以為戮而歸之也不然天去其疾矣豈其失魯而欲以莒疆之千社為臣宋伐曹例莊十有四年齊人陳人曹人伐宋僖十有五年宋人伐曹十有九年宋人圍曹宣三年宋師圍曹哀三年宋樂髠帥師伐曹六年宋向巢帥師伐曹七年宋人圍曹鄭駟𢎞帥師救曹八年宋公入曹以曹伯陽歸嗚呼曹文之昭也入春秋來其國趨於奢陋其君安於媮弱故春秋於曹無特筆之文其事大國最謹其與小國無怨故曹於春秋為無辠之國藐然在宋之宇下得保首領以没其敢爭尋常以盡其民不幸從齊討北杏之㑹以府宋人之怨者㡬二百年吁此豈曹人之辠哉齊桓始伯召師於曹不從則移伐宋之師而加之曹從之則以從齊之故而蓄怨於宋進退辠也為謀實難况是時上有單伯之㑹伐下有陳侯之偕行若以為辠不獨一曹曹亦不料宋人之怒至此也二幽之役宋既在會曹不得從厥後齊桓稍進曹於㑹盟之末其爵固宜班在鄭伯之列何乃常抑於許男之下原齊桓之心不過欲抑曹以謝宋耳終春秋盟㑹因仍不改則齊桓之私心實啟之末年伯業少衰曹已䝉伐齊桓朝訃於諸侯宋師夕至其城下伐喪不義脩怨不仁僕僕然驅一曹而來不知宋既脩怨於齊其肯釋怨於曹哉曹南之盟曹人雖在識者覘其他日之必不免前以伐書後以圍告宋人之加兵於曹者浸重向非執於盂敗於泓有荆楚以為宋患則宋人得志入曹以歸之事豈待春秋末年而後見耶抑人亦有言敵恵敵怨不在後嗣宋自桓公以來今㡬世矣我宣公之三年宋人聞晉之有楚患也興師圍曹雖曰報武氏之亂實則怒於室而色於市也宋雖無曹猶憚伯主曹猶恃晉自庇其國臯鼬一盟諸侯瓦裂鄭敢於滅許蔡敢於滅沈陳敢於滅頓宋猶隠忍置曹於不問者諸侯惟宋事晉故也洮之㑹宋既無晉豈復有曹一伐以樂髠再伐以向巢伐而不已則圍圍而不已則入振鐸之宗社墟矣夫自宋人憾曹一百八九十年而加兵於曹者三㑹洮以至入曹相去九年而加兵於曹者四吾是以悲天下之無伯也雖然曹亡非宋之辠也曹之先逺君子親小人其來已非一日僖負羈賢臣也不能用公子㑹好禮君子也使出奔子臧社稷之鎮公子也致邑與卿而不出赤芾三百彼何人斯吾觀曹風之詩有四而譏其逺君子親小人者二此固詩人一時諷詠之言至曹伯陽卒用公孫彊而亡其國詩人之㫖深矣春秋無宋公滅曹之文者曹自取之也左氏浮誇乃謂或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫彊許之若冥冥之中隂有以使之者使後世人君用小人以敗其國而卒諉於天數者必左氏之言也夫齊晉伐戎狄例莊二十年齊人伐戎三十年齊人伐山戎三十有一年齊侯來獻戎捷僖十年齊侯許男伐北戎三十有三年晉人敗狄于箕宣十有五年晉師滅赤狄潞氏以潞子嬰兒歸十有六年晉人滅赤狄甲氏及留吁成三年晉卻克衛孫良夫伐廧咎如十有二年晉人敗狄于交剛昭元年晉荀呉帥師敗狄于大鹵十有二年晉伐鮮虞十有五年晉荀呉帥師伐鮮虞十有七年晉荀呉帥師滅陸渾之戎定四年晉士鞅衛孔圉帥師伐鮮虞五年晉士鞅帥師伐鮮虞哀四年晉人執戎蠻子赤歸于楚六年晉趙鞅帥師伐鮮虞戎患國二莊十有八年公追戎于濟西二十有四年戎侵曹狄患國八莊三十有二年狄伐邢閔二年狄入衛僖八年狄伐晉十有一年狄滅温十有四年狄侵鄭三十年狄侵齊文七年狄侵我西鄙十年狄侵宋嗚呼外域之患文武之世未免有之詩自采薇治外以下厯道獫狁孔棘之辭才一章及於西戎而已春秋載戎患之國二狄患之國八則狄患視戎患為尤甚嗚呼戎狄之患自古然爾至正名之書春秋紀戎之事不如紀狄之事爲詳戎之事在春秋之始狄之事在春秋之中其名蠻陸渾之類於狄曰赤狄白狄潞氏甲氏留吁之類深惡他族之滋實偪處此與我中國共有此土也然夷狄之患不足憂戎狄黨楚之患深足憂戎起於西狄起於北得以緩齊人討楚之師狄强於北秦强於西得以窘晉人治楚之計秦楚戎狄俱弱而晉卒輸伯於呉則春秋於是終焉耳魯惠以來三世脩好桓隠二君踰嵗即盟以堂堂周公之魯而制命於東郊之戎公及之盟不以為諱莊公不尋舊好而戎人敢為濟西之患虐執王使隠七年而衛人不能救廢置曹君荘二十四年而方伯不敢問后稷封殖天下實誰制之不得不攷其故盖自莊公二十年齊人伐戎三十年齊人伐山戎自是戎終春秋不為大患矣齊侯獻捷之明年狄人伐邢越二年狄又入衛止一戎而生一狄齊侯始付之無可奈何次聶北城楚丘聊以紓邢衛之目前姑且置狄人於度外以戎狄故齊人不得南向而問楚者二十有五年入蔡伐鄭竟莫之恤至戎狄少戢中夏少安然後為召陵之役識者已恨其晩兹非戎狄迭起有以牽制之歟召陵服楚狄人不敢睥睨諸侯者四年桓公經營諸侯惟晉不來齊不敢伐狄敢伐之伐晉固有輕齊之心温王畿之諸侯滅温僖十年又有輕周之意借曰晉逺諸侯齊置不問温王畿也辠無所逃不合諸侯以討狄辠乃召許男以同伐北戎僖十年不知孰重孰輕孰急孰緩耶無何衛僖十三年鄭僖十四年又以侵告楚人間中國之狄患滅黄僖十四年伐徐僖十五年勢又張於前日矣桓公屢駕伐戎之功不足以贖終身縱狄之辠使為諸侯他日憂也桓公云亡僖十七年楚狄交熾敢假義以救齊僖十八年敢示威以伐衛十八年敢被髮左袵與諸侯盟僖二十年諸侯無嵗不有狄師亦無嵗不有楚患春秋子楚而人狄蠻夷之强至此哉城濮之役一戰勝楚意狄人為是震惙不敢復謀不數年侵齊僖三十年圍衛三十一年文公尚在狄且無畏文公既殁狄不伐晉而及箕耶僖三十三年此一役也先軫不反命大為晉恥故文公以後狄患尤甚於僖公以前之年侵齊文四年侵我文七年侵宋文十年侵衛十三年良以諸侯無討故也加以秦人世仇屢為晉梗晉人北顧則有狄西顧則有秦諸浮之㑹文十三年傳夏六卿相見於諸浮豈為他人惟秦狄是憂使楚人得恣睢於浪淵文九年壺丘九年夏厥貉十年皆見傳之役諸侯盡為之有新城之㑹文十四年僅僅收拾旋又失之宣元年伐鄭六年侵陳辰陵之盟宣十一年一付之楚晉失為伯寧非攅函一役誤之耶嗚呼成楚人抗伯之勢者秦狄為之也中行桓子懲邲之敗宣十二年捨楚問狄以文其喪師之恥赤狄潞氏林父滅之宣十五年甲氏留吁士㑹滅之宣十六年君臣相與告慶而矜功春秋不稱其帥止稱師或稱人者荀范求名而不得也成三年晉郤克伐廧咎如十二年晉人敗狄於交剛喪師於楚而取償於狄所得㡬何然自交剛以後狄不為諸侯憂者三十有九年不可謂晉人無功也大鹵一敗昭九年狄遂大創終春秋不復見經矣嗟夫戎盛於春秋之初而狄踵之狄起而戎已衰狄盛於春秋之中而秦踵之秦張而狄猶熾之三强者不足為齊晉之弱祇足以成楚人之强至春秋之終秦楚戎狄俱以憊告而晉之伯業卒不加於前時者晉卿貪伐鮮虞之辠也召陵討楚機㑹可乗晉辭諸侯乃以中山不服藉口今年士鞅帥師伐鮮虞明年士鞅帥師伐鮮虞蔡侯反假手於呉以伐楚呉以入郢告功於諸侯晉師猶數數於鮮虞不少赦失肩背而養一指其謂何哉昭定哀之春秋書晉伐鮮虞者五大扺陪臣自為封殖之過而晉伯堂堂然去矣嗚呼桓文縱狄固無損伯業之盛景厲以來之治狄亦無救于伯業之衰憂戎狄者盍亦自强於政治而已不然秦楚戎狄之俱弱而晉遂失伯何耶内大夫帥師例隠二年無駭帥師入極四年翬帥師㑹宋公陳侯蔡人衛人伐鄭十年翬帥師㑹齊人鄭人伐宋莊二年公子慶父帥師伐於餘丘僖元年公子友帥師敗莒師于酈獲莒拏四年公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳十有五年公孫敖帥師及諸侯之大夫救徐二十有七年公子遂帥師入杞三十有三年公子遂帥師伐邾文十有二年季孫行父帥師城諸及鄆十有四年叔彭生帥師伐邾宣十年公孫歸父帥師伐邾取繹成二年季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績三年叔孫僑如帥師圍棘六年仲孫蔑叔孫僑如帥師侵宋襄十有二年季孫宿帥師救台遂入鄆十有五年季孫宿叔孫豹帥師城成郛二十年仲孫速帥師伐邾二十有三年叔孫豹帥師救晉次于雍榆二十有四年仲孫羯帥師侵齊昭元年叔弓帥師疆鄆田五年叔弓帥師敗莒師于蚡泉十年季孫意如叔弓仲孫貜帥師伐莒十有三年叔弓帥師圍費定六年季孫斯仲孫何忌帥師圍鄆八年季孫斯仲孫何忌帥師侵衛十年叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈十有二年叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費哀元年仲孫何忌帥師伐邾二年季孫斯叔孫州仇仲孫何忌帥師伐邾三年季孫斯叔孫州仇帥師城啟陽叔孫州仇仲孫何忌帥師圍邾六年仲孫何忌帥師伐邾嗚呼君將不稱帥師例也春秋書公伐者六㑹諸侯伐者十有八豈其伐人而徒公以行哉盖君行則師從春秋雖用大衆不稱師見師者人君之所當有卿行則旅從春秋於大衆必稱師見師者非人臣之所得專兵權有國之司命權去則國随之秦漢而下外權重則勢逼京師内權重則變生肘腋委人以權久且不可况春秋諸侯之大夫世世之乎攷三家强盛之迹公室淩替之由深歎夫亂臣賊子未有不得兵權而後動於惡也其間豈無成季之勲文子之忠獻子懿子之賢而穆子昭子之不忘公室也類能保於其身而不能保於其再世能保於再世而不能保其數世之後人君何樂為不可保之事而予之以不可制之權吁魯無駭其首竊權者歟繼是而翬繼是而慶父隠閔之事俱不忍言至僖公元年之公子友四年之公孫茲十有五年之公孫敖儼然三家鼎立之名已有公室𤓰分之兆入把伐邾又加公子遂焉三家不得而專此也仲遂竊權之效卒見於文公之末年宣公徳遂之立已也深愛其子舉國以聽之帥師伐邾以歸父徃㑹齊伐莒以歸父徃魯國之兵權偏重於東門父子之手三家竟不得其尺寸彼其日夜切齒於東門氏者盖十有八年矣一旦宣公捐魯而歸父之為路人宜哉成公以後非三家不帥師鞌之戰謂魯有四軍者愚也謂魯有三軍臧孫特與其謀議者臆說也盖季孫行父將一軍而臧孫許佐之叔孫僑如將一軍而公孫嬰齊佐之魯人大賞戰鞌之功並登四子春秋循魯史書之耳自後臧氏東門氏並不以帥師見經非三家誰復有師哉此襄公十一年作三軍之兆也侵宋之役叔仲舁尸城成之役叔季偕徃三家大扺以戰鞌為例成襄之世他臣不復帥師至昭公十年季孫意如叔弓仲孫貜帥師伐莒叔弓乃叔肸之子不在三家之列猶執兵權在叔孫之上者季氏引叔弓以為副也元年疆鄆則曰叔弓五年敗莒則曰叔弓十三年圍費則又曰叔弓非為他人為季氏也不然作三軍而公室分為三舎中軍而公室分為四尺地一民俱非公有安得有叔弓者而帥師耶他年公徒說甲執冰以逰左右皆季氏之私人無季氏是無叔孫氏三家皆季氏之私黨獨昭子忠不忘君謀不濟則以死繼之終亦無可奈何而已嗚呼大夫陵公室則陪臣得以陵其大夫邑吾邑也吏吾吏也至使二卿帥師圍之墮之三家其悔是哉吾嘗持春秋之法而繩其帥師之辠書入書取大夫之貪利也書敗書獲大夫之貪功也書侵則受大國之令以侵與國畏之也書伐則挾其國之强以加小國欺之也㑹伐㑹侵伯主未興辠公室也伯主既興辠伯主也城邑畏外國之患也疆田慮小國之爭也及而救者伯主之不在諸侯也救而次救而遂者大夫之不用君命也圍邑則公室之有叛民三家之有叛臣也圍國則天下之無伯主大國之無小國也此猶魯大夫也鞌之戰列國兵權盡屬之大夫晉大夫帥師自文公之三年始處父救江宋鄭大夫帥師自宣公之二年始宋華元鄭歸生戰於大棘之地衛未有大夫將也而始於成公之二年鞌之戰孫良夫曹未有大夫將也而始於成公之二年公子首魯未有諸卿並將也諸卿並將亦始於是年鞌之戰季孫行父臧孫許叔孫僑如公孫嬰齊列國兵權不屬之大夫者盖寡矣楚大夫帥師始於成公六年公子嬰齊伐宋晉魯之大夫强而列國之大夫强春秋不可復制吁豈大夫之辠哉豈大夫之辠哉春秋提綱卷四
