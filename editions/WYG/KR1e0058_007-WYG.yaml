body:
  text: 春秋提綱卷七宋陳則通撰盟㑹門王臣㑹盟例荘十有四年單伯㑹齊侯宋公衛侯鄭伯于鄄僖五年公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止諸侯盟于首止八年公㑹王人齊侯宋公衞侯許男曹伯陳世子款盟于洮九年公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘諸侯盟于葵丘二十有九年公㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉成十有七年公㑹尹子單子晉侯宋公衞侯曹伯邾人伐鄭六月乙酉同盟于柯陵襄三年公㑹單子晉侯宋公衞侯鄭伯莒子邾人齊世子光同盟于雞澤昭十有三年公㑹劉子晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘嗚呼余讀左氏春秋至周鄭交質之事而深悲焉曰交質之始下盟之漸也夫盟為疑起也無疑固無盟也諸侯有疑㑹同則内史掌其盟司冦莅其約此王室所以待諸侯也諸侯何疑於王室而輒敢與之盟哉王臣下盟見經者五其一在齊其四在晉首止以来齊有王室之故則其盟専在于謀王室翟泉以後晉無王室之故而其盟專在於謀一鄭平丘之役晉無王室之故而其盟専在於謀諸侯吾觀僖之八年盟洮之舉又深悲夫齊桓不幸而首是盟也或者之論則曰首止之役殊㑹世子也葵丘之役不盟宰周公也洮之盟王人之㣲雖盟無傷也是或者之為是説非惟不知春秋亦不知齊桓之本心也盟洮非美事也其盟盖春秋之所謹其事則有不獲已焉東宫之器危在朝夕首止之事天子惡之叔帶王后之愛子也公卿大夫半其黨與天王即世世子不發喪而告難于齊此豈大得已者哉喪不得立故也公卿大夫皆不之遣而下士實行此必世子私以為使令者也當是時王位未定世子使令之私得以王人序於諸侯之上載於盟書之首則世子之宜王夫奚疑嗚呼此固齊侯為恵后叔帶及在廷之公卿大夫而設是盟也事不至此我知齊侯不敢屈王人于盟矣㑹洮之明年周公實来王位定矣吾合諸侯以尊事周可矣使齊侯稍欲凌宗周以宣示其侈雖屈周公於葵丘之盟其畏不從哉㑹而不盟其意可見奈之何重耳不察齊所以盟王人之故不諒齊所以定王室之心始曰齊桓之伯常與王人盟耳既不憚於天王之召又何憚於王子之盟不思洮之盟為王室之故翟泉之盟為鄭人之故則諸侯自為盟可也於王子虎何為哉没公而不書人王子而不爵人諸侯之大夫而不名春秋盖慎之而又慎之也後乎王臣下盟則有例而書同者矣鄢陵一㨗鄭人不来大合諸侯于柯陵經書曰同同諸侯盟可也同尹子盟不可也虎牢大城鄭即請服大㑹諸侯于雞澤經書曰同同諸侯盟可也同單子盟不可也疊此二盟皆以鄭故至於平丘晉君之憂不惟鄭齊不與盟而齊貳魯不與盟而魯貳淫芻蕘於衞而衞亦貳叔向曰諸侯不可以不示威則平丘之㑹經書曰同志諸侯之不協而盟也非有王室之不協劉子何故而下同是盟邪有王室之故而盟王室者事之權也無王室之故而盟王室者事之變也余固深悲夫齊桓不幸而首是盟也甞閲春秋世變而思其故齊桓剏伯之初諸侯離而始合之時也王室甫降伯業良難不尊王人以謀王室不足以示伯主之義晉文繼伯之後諸侯乍離乍合之時也晉得鄭則晉伯楚得鄭則楚伯不挾王臣以謀一鄭不足以示伯主之功晉昭紹伯之日諸侯合而復離之機也伯之存否決在此盟不挾王臣以謀諸侯不足以示伯主之威謀王室則齊伯强也謀一鄭則晉楚争也謀諸侯則晉伯去而楚伯亦去也故王臣之盟至於平丘終焉平丘以後中國諸侯不復㑹盟者二十有三年召陵之役劉子在盟而不書盟黄池之役單子在㑹而不書㑹此春秋終不與王臣㑹盟諸侯之意也抑吾於翟泉大夫之盟猶有遺論焉城濮以後諸侯與晉周旋十有四年文公末年功成而志怠有不復重勞於諸侯之意翟泉之役始使其大夫不知罅隙一開公室弱而大夫强自此盟始即世未㡬垂隴之盟諸侯皆在士縠主之于扈之盟諸侯皆徃盾實専之士縠死而盾益强晉人不知有公而知有盾諸侯不聞有公而聞有盾春秋㑹盟亦不書晉侯而書盾新城之盟大列七國之諸侯而書趙盾且例之曰同同授趙盾以政也桃園之事識者已覘其後當時諸侯之大夫未有如晉盾之専者晉首䝉禍則翟泉之盟有以啓之也嗚呼此猶伯主之大夫而盟外諸侯者也又其甚也鄭伯及伯有盟宋公及華氏盟衛侯及析朱鉏北宫喜盟君從臣於盟者也又其甚也趙鞅盟于公宫臣逼君於盟者也迹其所從来則翟泉之盟有以啓之也嗚呼盟而至此春秋不復作吾亦不復論也齊伯時王臣㑹盟例僖五年公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟八年公㑹王人齊侯宋公衞侯許男曹伯陳世子款盟于洮鄭伯乞盟九年公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘諸侯盟于葵丘嗚呼僖公以前魯其宗盟之長乎甞讀衞子魚道踐土之盟曰晉重耳魯申衞武蔡甲午鄭㨗齊潘宋王臣莒期頗與春秋所敘之文異因是思之周之宗盟異姓為後晉為盟主未有先晉者也又因是疑之晉之為伯晉固常先若齊尸盟何以為序若用宗盟之禮乎齊序於後不得以為伯主若不用宗盟之禮乎齊冠於先宗周之禮蕩然矣蕩宗周之禮典率列國而同盟周未改物奚遽至此春秋自盟蔑以来有二國盟者有三國盟者極而至于四國盟者第諸侯自相為盟也隠公使告薛侯凛然有先後次序之别况小白之伯率十數諸侯相與歃盟廢同盟而行伯政其書又不登之天府齊之為齊豈無可嫌疑之迹乎何春秋獨予齊以伯也或曰周室未衰則權在周周室既衰則權在伯魯以周班後鄭而忽也怒小白之伯其肯後諸侯乎踐土之役王子盟諸侯于王庭子魚則有藏在盟府之言若齊侯則吾未見其為然也吁大不然㑹鄄以来大盟有九小盟有七借曰於王室乎何與首止之盟王世子實臨之葵丘之盟宰周公實臨之洮之盟王人實與之謂不係之王室可乎若係之王室其盟固為宗盟也其書固蔵之天府也又因是而思之周之宗盟異姓為後此諸侯載書之文㑹先主㑹盟先主盟此聖人約史之文也諸侯之盟未嘗不推齊以為長諸侯之史未嘗不載齊以為長故僖公之前伯主齊侯而魯為宗盟之長僖公之末伯主晉侯而魯為宗盟之次齊之伯也書曰公㑹齊侯宋公晉之伯也書曰公㑹晉侯齊侯皆春秋筆法也不然書公及公㑹豈亦當時載書之文哉吾觀踐土之盟於同姓則先書晉次書魯於異姓則先書齊次書宋此齊桓舊載書之灋也若前此齊宋常在諸姬之先一旦晉文遽列於諸姬之後滕薛之事不見於踐土乎吾固知二幽以後之盟即踐土之盟也晉之世伯日久日忘宗周典禮失不可復宋之盟晉人曰先晉楚人曰先楚叔向子産向戌皆諸侯之良獨不舉隠公告薛侯之語以折晉楚之訟遂使楚人得執牛耳而晉失為伯矣虢之㑹再讀舊書可勝嘆哉可勝嘆哉伯主列國諸侯㑹盟始末例荘十有三年春齊侯宋人陳人蔡人邾人㑹于北杏冬公㑹齊侯盟于柯十有四年冬單伯㑹齊侯宋公衞侯鄭伯于鄄十有五年春齊侯宋公陳侯衞侯鄭伯㑹于鄄十有六年冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽二十有七年夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽僖元年八月公㑹齊侯宋公鄭伯曹伯邾人于檉二年秋九月齊侯宋公江人黄人盟于貫三年秋齊侯宋公江人黄人㑹于陽榖四年盟于召陵五年公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止八月諸侯盟于首止鄭伯逃歸不盟七年秋七月公㑹齊侯宋公陳世子款鄭世子華盟于寗母八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子款盟于洮鄭伯乞盟九年公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘九月戊辰諸侯盟于葵丘十有三年公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹十有五年公㑹齊侯宋公陳侯衞侯鄭伯許男盟于牡丘十有六年冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮十有九年夏六月宋公曹人邾人盟于曹南冬㑹陳人蔡人楚人鄭人盟于齊二十有一年宋人齊人楚人盟于鹿上秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂十有二月癸丑公㑹諸侯于薄二十有五年冬十有二月癸亥公㑹衞子莒慶盟于洮二十有六年春王正月己未公㑹莒子衞甯速盟于向二十有八年五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土冬公㑹晉侯宋公蔡侯鄭伯陳子莒子邾人秦人于温二十有九年夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉文元年公孫敖㑹晉侯于戚二年三月乙巳及晉處父盟夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴七年秋八月公㑹諸侯晉大夫盟于扈八年冬十月壬午公子遂㑹晉趙盾盟于衡雍十有四年六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城十有五年冬十有一月諸侯盟于扈十有七年諸侯㑹于扈宣七年冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤九年九月晉侯宋公衞侯鄭伯曹伯㑹于扈十有一年夏楚子陳侯鄭伯盟于辰陵秋晉侯㑹狄于櫕函十有二年晉人宋人衞人曹人同盟于清丘十有五年公孫歸父㑹楚子于宋十有七年己未公㑹晉侯衞侯曹伯邾子同盟于斷道成元年臧孫許及晉侯盟于赤棘二年十有二月公㑹楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衞人魯人齊人曹人邾人薛人鄫人盟于蜀五年十有二月己丑公㑹晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢七年公㑹晉侯齊侯宋公衞侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵九年公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲十有二年夏公㑹晉侯衞侯于瑣澤十有五年三月癸丑公㑹晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚冬十有一月叔孫僑如㑹晉士燮齊髙无咎宋華元衞孫林父鄭公子鰌邾人㑹吴于鍾離十有六年秋公㑹晉侯齊侯衞侯宋華元邾人于沙隨十有二月乙丑季孫行父及晉郤犫盟于扈十有七年公㑹尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭同盟于柯陵十有八年十有二月仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾襄二年秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢三年六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟五年仲孫蔑衞孫林父㑹吴于善道公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吴人鄫人于戚公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳左氏曰于城棣七年十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬陳侯逃歸八年季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘九年冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲十年春公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吴于柤十有一年公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吴于向冬季孫宿㑹晉士匄宋華閲衛孫林父鄭公孫蠆莒人邾人于戚十有六年三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁戊寅大夫盟十有九年春王正月諸侯盟于祝柯十八年同圍齊之諸侯前目後凡也二十年夏六月庚申公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵二十有一年公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任二十有二年冬公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨二十有四年公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀二十有五年公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀秋八月諸侯同盟于重丘二十有六年公㑹晉人鄭良霄宋人曹人于澶淵二十有七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋秋七月辛巳豹及諸侯之大夫盟于宋二十有九年仲孫羯㑹晉荀盈齊髙止宋華定衞世叔儀鄭公孫叚曹人莒人滕人小邾人城杞三十年晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故昭元年叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申十有一年秋季孫意如㑹晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憗十有三年秋公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘二十有五年夏叔詣㑹晉趙鞅宋樂大心衞北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父二十有六年秋公㑹齊侯莒子邾子杞伯盟于鄟陵二十有七年秋晉士鞅宋樂祁犂衞北宫喜曹人邾人滕人㑹于扈三十有二年冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周定四年三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚五月公及諸侯盟于臯鼬七年秋齊侯鄭伯盟于鹹齊侯衛侯盟于沙八年公㑹晉師于瓦冬衛侯鄭伯盟于曲濮十年夏公㑹齊侯于夾谷冬齊侯衞侯鄭游速㑹于安甫十有二年冬十月癸亥公㑹齊侯盟于黄十有四年公㑹齊侯衞侯于牽秋齊侯宋公㑹于洮哀二年癸巳叔孫州仇仲孫何忌及邾子盟于句繹十有二年公㑹吴于槖臯十有三年公㑹晉侯及吴子于黄池嗚呼同盟者何伯令也何以書志異也同盟何以為異哉我諸侯也彼諸侯也胡為乎我伯也人不足以使人畏惟神足以使人畏賞罰不足以使人信惟禍福足以使人信于是率天下之諸侯而曰同盟曰同盟者盖亦强其不同者而同之也余甞論春秋伯主之盟獨書盟者有諸侯之同書同盟者有諸侯之異而書同者二幽之同天子之政始自諸侯出也以諸侯而從諸侯其心未免有所疑新城之同諸侯之政始自大夫出也以諸侯而從大夫其心必有所不欲清丘之同中國屈於荆楚也以後之盟屢書同者諸侯之異者猶可同也平丘之同諸侯厭于伯主也以後之盟不書同者諸侯之異者不可同也春秋書盟一百一十有二書同盟十有六同盟之闗於天下大變者有四試以春秋之顛末評之盟蔑盟宿不過為保社稷守宗祧計石門之盟志不在小盟艾以来魯黨齊鄭有石門之盟則有瓦屋之盟有瓦屋之盟則有惡曹之盟終齊僖鄭荘之世所與周旋惟一魯耳最後失一魯而得一衞終不得先桓文以鳴何也諸侯不忍舍王室故也小白之伯豈不戛戛乎難哉北杏之役四國僅以㣲者至鄄之役假手於王官而魯不来再役主㑹於齊侯而魯不㑹齊不得魯不足以求諸侯幽之役羅致天下諸侯相與盟歃前此春秋所無之事諸侯疑之齊侯亦自疑之且曰同盟伯主令諸侯之辭也是盟魯始来而猶以為諱在盟諸侯想不獨魯也遲遲十載之期再盟如初諒伯功至久而後信人心至久而後孚然而衞又不来則在盟諸侯必有勉强而盟者矣諸侯之疑齊非不欲從齊也向也知有周今胡為齊也向也知事王今胡為伯也兩書同盟志諸侯之異也盖自貫澤以来諸侯始信齊桓公一匡之功首止一㑹諸侯始信齊桓公尊王之義嶽瀆諸侯莫敢不来鄭不相時而動棄晉即楚經書立異獨舉其人以見當時皆從齊之諸侯也自是大㑹者二大盟者四諸侯麇至以為盟則盟矣不曰同盟誰敢不同哉二幽之同懼其不同也齊侯創伯之始也首止以後不書同諸侯不期同而自同也齊侯成伯之後也曹南之君不在伯列盟鹿㑹盂事已可羞晉文繼齊一呼吸間精采頓異召陵城濮之績前後輝煥齊桓經營伯業三十餘年不能致强大之晉晉文一㑹而齊亦来三十餘年不能致蕞爾之莒晉文一㑹而莒亦至諸侯厭楚人之甚思齊伯之功幸晉文之来踐土翟泉不待令之同盟而後同矣然自翟泉以後罅隙一開晉以大夫世其伯亦以大夫世其患士縠㑹諸侯于垂隴有公孫敖在書敖所以敵士縠也趙盾㑹諸侯于扈不序諸侯不名大夫不與諸侯敵趙盾也盖自狼淵伐鄭壺丘侵陳厥貉臨宋楚盡有諸侯晉於是有新城之㑹諸侯皆在求晉君而得趙盾能無疑乎盾亦懼七國諸侯之不從於是乎有同盟之令同則同矣不知置三尺之孤于何所也禮樂征伐自大夫出故晉之盟㑹無靈公二扈之役不序諸侯必趙盾在春秋不忍再書其名使若諸侯自盟㑹也嗚呼公子結之盟齊陳以為討陽處父之盟魯人以為辱晉人屢以大夫敵諸侯失陳失鄭其不坐此邪後乎書大夫盟書諸侯之大夫盟専利不顧皆趙盾有以先之也吾故謂天子之政自諸侯出二幽乃世道之一變也諸侯之政自大夫出新城乃世道之再變也城濮以後楚人不敢窺中國者十五年能有浪淵壺丘厥貉之師而不能止三國于新城之㑹自文十有五年扈之盟失齊賊而不討十有七年扈之㑹失宋賊而不討諸侯已有輕晉伯之心宣十有一年攅函之㑹又失陳賊而不問荆楚遂敢竊晉伯之權于是盟辰陵于是討徴舒于是入鄭而敗晉而楚成為伯矣邲之役楚人得志盖與城濮之戰相當克鄭而後宋魯衞其危哉晉人不能藎仁賢修政事以保其國惴惴然懼中國之從楚要之同盟清丘之言尚新衞不旋踵而背之矣是盟無得罪于伯主者唯一宋耳越三年歸父㑹楚君于宋又四年公與諸侯盟楚卿于蜀齊之盟尚得以無伯藉口諸侯有晉何以至此嗚呼清丘之盟非中國屈于荆楚歟繼是景公之同盟者四厲公之同盟者二悼公之同盟者四大抵閉其從楚之路而驅其從晉之行諸侯乍合乍離乍去乍就直至蕭魚之役不書同盟而書㑹則晉于是再得諸侯也是則清丘以後之盟屢書同諸侯之異者猶可同也繼是七合諸侯三合大夫徴㑹討貳諸侯無缺重丘之役晉以賄賂失諸侯同盟之令復起矣越二年而為宋之盟則中國從楚之勢始決此一役也晉人謹守楚盟敢㑹不敢盟者十有八年陳蔡之滅晉當問罪而不問乾谿之役晉當討賊而不討虢申之㑹晉不當許諸侯而許之諸侯乃信荆楚之訴絶兄弟之國叔向曰寡君有甲車四千乘在諸侯歸晉之徳只若緫其兵威以臨之魯有辭矣何懼觀叔向告齊之語讀之猶㦸人喉要人以盟豈禮也哉自此晉人不得盟諸侯者又二十有三年諸侯之厭伯主也臯鼬之盟伯主諸侯於此乎始叛鹹之盟石門之舊㑹也盟沙而衛叛㑹夾谷而魯叛㑹洮而宋叛是則平丘以後之盟不書同諸侯之異者不可同也嗚呼中國屈于荆蠻清丘乃世道之三變也諸侯厭於伯主平丘乃世道之四變也疊是四變春秋同盟於此而絶筆矣榖梁曰同盟志同欲也愚則曰同盟志不同欲也强其不同而同之也祗以叔向告齊一事觀之榖梁其有辭乎或曰子論齊晉之同盟而齊晉楚之爭盟猶未之論也曰齊伯㑹盟之國十有五晉伯㑹盟之國有二十凡以藉手争伯者不過陳蔡鄭許而已此四國者繫中國伯業之盛衰者也齊桓失蔡見於㑹盟者陳鄭許也晉文失許見於㑹盟者陳蔡鄭也晉文即世蔡速飛而不来許一盟而不復黽勉執玉帛以從諸侯者獨陳鄭而已我宣公以来鄭叛而陳服陳叛而鄭服二國且不純乎主晉景公失陳其見於蟲牢馬陵蒲戚鍾離之盟僅僅一鄭悼公救陳戍陳終亦無可奈何而棄陳于戚以後之五㑹于戲以後之三駕亦惟一鄭大抵楚取三而晉取一耳若鄭人純于主晉猶可犧牲玉帛待於二境晉何以宗諸侯加以東方之齊西方之秦屢為伯主肘腋之患斷道祝柯瑣澤等㑹頗費經營晉之世伯正不易守也楚人毎有中國之事則陳蔡鄭許是攝是賛齊之役佐之盟齊盂之㑹佐之執宋蜀之役佐之盟宋魯衞誰倡謭謀作宋之㑹偃然致蔡歸生於宋衛之上陳鄭許皆在列焉此荆蠻乗中國之大隙也楚得之而晉始弱後来召陵一㑹陳蔡鄭許昔楚而今晉頓胡小國昔楚而今晉此又中國勝荆蠻之一大機也晉失之而吴始興伯主不為而他人得以藉手耳鍾離善道戚柤之四㑹将致吴以抗楚豈料黄池一役反致吴以抗晉設使召陵得志天下事豈至此邪讀經至此太息而止春秋提綱卷七
