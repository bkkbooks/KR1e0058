body:
  text: 春秋提綱卷六宋陳則通撰朝聘門晉魯交聘例僖三十年公子遂如京師遂如晉三十一年公子遂如晉文五年公孫敖如晉六年季孫行父如晉公子遂如晉葬晉襄公十有五年季孫行父如晉宣十有八年公孫歸父如晉成三年晉荀庚来聘六年公孫嬰齊如晉季孫行父如晉八年晉士燮来聘十有一年晉郤犫来聘季孫行父如晉襄元年晉荀罃来聘五年叔孫豹鄫世子巫如晉六年季孫宿如晉八年晉士匄来聘九年季孫宿如晉十有三年晉士魴来聘十有六年叔孫豹如晉十有九年季孫宿如晉二十有四年叔孫豹如晉二十有六年晉荀吴来聘二十有八年仲孫羯如晉二十有九年晉士鞅来聘仲孫羯如晉昭二年晉韓起来聘叔弓如晉季孫宿如晉六年季孫宿如晉八年叔弓如晉十年叔孫婼如晉十有六年季孫意如如晉二十有一年晉士鞅来聘二十有三年叔孫婼如晉定六年季孫斯仲孫何忌如晉嗚呼古之大夫聘問不出竟今之大夫交政乎中國吾味斯言而深悲之春秋之初諸侯之聘問尚簡大夫不得以通外交春秋之中諸侯之聘問寖繁大夫始得以藉外權春秋之末外交愈固外權寖重而大夫皆得以為内患盖春秋之義卿非君命不越竟祭伯之来春秋於王臣先絶之正本澄源之論也内大夫猶未有交乎外者自莊之二十七年季友如陳葬原仲則大夫之外交於是始然當是時諸侯之聘問尚簡而大夫外交之迹易見也屬有齊晉之事行李之命無月不至假聘行私皆得以遂其外交之謀而没其外交之迹吁可畏哉春秋之書曰某年某如晉某如晉而外交之迹自見矣季孫専魯魯君之失政者六失國者二豈一朝一夕之故原其始終大抵倚晉之大夫為重文公之世其㣲也成襄之世其著也至昭公則寖烈寖盛而不可禦也晉襄木拱宣子實執晉柄而行父適来他年齊侵之告卒能轉移諸侯之師于扈之㑹㣲行父之力不及此仲遂主齊立接魯卿之足迹不及晉竟者蓋十有七年宣公即世東門氏逐一反掌間移向日之主齊為今日之主晉非異人任行父也行父内則専政於魯外則取功於晉六年新田之賀行父實行締交大國非前日比十年成公如晉晉人以公之貳於楚也而執之及歸猶使郤犫盟公不信我公之朝乃獨信於行父之聘自此魯國之權始顛倒操縦於季孫之手矣苕丘之辱僑如之譖實為之行父之歸范文之言實奨之晉重季孫而赦魯也非重魯而赦季孫也嗚呼若季孫行父猶可繼是而宿繼是而意如魯尚足以為魯哉武子世父之爵位魯之卿於晉何與且於晉乎見於晉乎聽命焉不過借辭以媚晉也八年晉士匄以聘幣来九年季孫以聘幣報范文有功於季武之父季氏徃報於范文之子季氏范氏之交始合矣荀偃為政姑使叔孫徃而請代范士匄為政季孫乃親徃而拜師季氏范氏之交始厚矣邢丘之㑹我襄公在晉不使公敵晉侯而使季孫敵晉侯則季孫之權甚重於公也此時襄公已失位矣豈特昭公失國之為可憐哉愚甞謂襄公以前魯之君敵晉之大夫也襄公以後魯之大夫敵晉之大夫而晉魯之君不與焉也當成公而有荀庚郤犫士燮之聘當襄公而有荀罃士匄士魴之聘或因公朝而晉以大夫聘也或因晉大夫聘而公遂徃朝也公之與大夫敵也二十有六年荀呉之来遂敢以召公為辭魯㡬移於晉之鄙邑矣華元子産輩所不為周公之魯獨甘心乎哉以大夫敵公猶可自二十九年之士鞅以後公且不得儕於晉之大夫矣韓起為政告於諸侯既来享於公復飲酒於季氏何為哉公以弔少姜而見辭季氏之致襚乃與之公以取牟婁而見辱季孫之徃謝乃享之公以取郠故而見止季孫十六年之行乃受之公屢朝而屢不入季孫屢聘而屢受吁季孫自此不君君矣平丘之執乃借力於荀呉昔主范氏今又主中行氏為之謀者衆矣季孫雖有不君君之志然猶忌叔孫昭子也士鞅之来使愛一牢而取憎於大國遲一年而使叔孫徃果而見執意如之為謀不亦巧哉陽州之行諸人視公如路人者冝也不令之臣不以為討反使荀躒㑹焉反使荀躒私焉范氏中行氏皆意如之匹也昭公欲歸又可得邪嗚呼苕丘之執釋行父者范氏也平丘之執釋意如者荀氏也適歴之㑹私意如者又范氏之使荀氏也吾攷昭公失國之由大抵季孫平時聘晉之故或曰東門以後聘晉不獨季孫子之咎季孫也何故曰諸臣莫强於三家三家莫强於季氏仲孫之聘晉者三其事簡也叔孫聘晉者五豹婼之為臣忠也季孫之聘晉者十二藉外權逼公室之罪大不可掩也况有主范主荀之實哉不寧惟是宋樂祁主范鄭伯石主韓衛孫林父甚善晉夫夫諸侯之大夫皆季孫也晉君弱六卿强付夏姬以司宫付費無忌以待客付逢孫楊孫以管鑰徒擁虚器於其上而朝歌晉陽之事起矣晉國之君亦昭公也又其甚也陪臣執命三家大弱梁嬰董安于之名疊見於傳季斯仲忌如晉春秋不於此而終乎嗚呼二卿之行誰使之也春秋之法不書其名愚亦不忍言其人衛魯交聘例文四年衛侯使寗俞来聘成二年衛侯使孫良夫来聘襄元年衛侯使公孫剽来聘七年季孫宿如衛衛侯使孫林父来聘嗚呼魯衛兄弟也入春秋来贄幣不交者百餘年抑人亦有言太姒之子惟周公康叔為相睦也何乃闊略如是邪隠桓之春秋舍婚姻之國未有書聘者也齊伯興而陳始聘晉伯興而衛宋鄭始聘諸侯交聘皆非邦交之常未免役役於伯主之故吾觀魯衛交聘之文而諸侯之事情瞭然矣自文以来晉數有憾於衛季年成公不朝而衛見伐衛人報之而卿見執我文公之四年衞侯徃謝於晉而怒未怠也以百餘年間闊之衞一旦寗子實来豈無事於魯而聘於魯哉此時魯於晉為睦數㑹晉君于戚矣數㑹晉卿于垂隴矣公又如晉而及晉侯盟矣公至自晉於是年之春寗子来聘於是年之秋不速之来者也謀將藉魯以介於晉也十有三年公又如晉衛侯遂㑹公于沓觀此則寗子来聘之意其謂不然邪新城以後衛又於晉為睦宣公即政我反不如之我公之朝以齊故我大夫之聘以齊故昔也衛藉魯以事晉今也又為晉以致魯七年之冬將為黒壤之㑹則春使良夫来盟焉衛之致魯必曰君必来我受其無咎已而盟歃未乾公反見辱則良夫於魯為欺矣季年魯不能堪於齊而始自歸於晉斷道之盟我公與焉衞侯與焉始私要結以謀齊矣越明年而晉侯衞世子臧伐齊又二年而晉魯衞之大夫戰齊于鞌則良夫来盟之意又謂不然邪我成公之三年良夫又聘則鞌戰之餘也以㨗齊而相慶以事晉而相勉自此魯衛不生他心矣此一聘也衞良夫来晉荀庚亦来胡為乎巧於相值也我襄公即位之元年晉悼之次年也子叔之来修舊好也此一聘也衞子叔来晉荀罃亦来胡為乎巧於相值也蓋衛在晉之宇下行李之徃来詳其動止而與之俱耳七年我季孫報子叔之聘衞林父拜武子之言大抵晉親而魯衛亦親也設或衛從楚而魯聘之則晉疑於魯魯從楚而衛聘之則晉疑於衛疑甚而禍生魯衛各保其邑之不暇何暇自相聘邪衞人之来聘者四来盟者一魯獨使季孫一徃報之兄弟之情薄報施之情忘矣嗚呼季孫之不徃報猶可季孫之徃報豈衞之幸也哉抑吾於衛聘之始終而有感焉寗子来聘成公復國之後也衛有寗子之聘而國始安孫林父来聘獻公失國之先也衞有林父之聘而國始危良夫傲慢為臣而君已不逃叔孫穆子之所料繼是而来魯者再其結於魯者深識者已懼其異日公孫剽何為者邪孫林父又何為者邪又加季氏焉二豎之黨合也二豎之黨合而獻公失國之禍已萌蘖於此矣異時晉悼伯心已倦㑹于戚以謀定衞君其君則前日聘魯之人也其與㑹之臣則魯衞之二豎也獻公之得居於夷儀者幸也吁宿之志成於意如夷儀之事豈獨於衛乎見邪鄭魯交聘例隠六年鄭人来輸平八年鄭伯使宛来歸祊桓十有四年鄭伯使其弟語来盟襄五年鄭伯使公子發来聘定十有一年及鄭平叔還如鄭莅盟嗚呼魯鄭東周之舊好也自鄭語来盟以後冠蓋不至魯者一百四十年其始来之使書人其繼来之使書名其又来則鄭君之貴介弟也鄭之加於魯者愈繁而愈重魯之待鄭者愈簡而愈輕抑春秋之初魯甚持重諸侯之媚魯者不惟鄭雖齊君兩遣介弟之来而猶不報也齊桓始伯魯始聘齊而又聘陳晉文世伯魯始聘晉而又聘宋玉帛交於諸侯其獨遺鄭乎齊伯而逃盟至勤新城之圍晉伯而貳楚至煩秦晉之師所幸城濮一戰楚人不敢爭中國者十有五年狼淵之役鄭及楚平辰陵以後南北兩屬鄭之不信諸侯之所聞也當是時鄭人犧牲玉帛待於二竟以待来者何暇修聘於諸侯魯若遣一介以問於鄭則取疑於晉晉人不知其謂寡君而固有外心也以百有四十年間闊之鄭一旦子發将命於魯鄭胡為乎来哉虎牢大城鄭人大懼於晉雞澤之㑹鄭始決意於從晉子發之来蓋將藉魯以媒於晉也㑹戚之役鄭伯與焉救陳之舉鄭伯與焉鄬之㑹僖公將從役於諸侯而卒不免於盗賊之手蓋春秋之所悲也向使僖公不決意於從晉則子發安得奉命而聘魯然則諸侯之邦交大抵役役於伯主之故也抑魯有鄭人之事五未甞不為之三太息焉輸平歸祊来盟隠桓之春秋也鄭方結齊而又致魯以從齊也子發来聘襄公之春秋也鄭欲結晉而藉魯以從晉也叔還如鄭定公之春秋也鄭又結齊而魯反藉鄭以從齊也召陵侵楚以後諸侯於晉敢離敢怨而不敢叛也環視四顧莫敢先動而定之七年齊鄭首盟于鹹以倡諸侯叛晉之舉十年我及齊平公㑹齊侯于夾谷十一年又及鄭平叔還如鄭莅盟則藉鄭從齊之意瞭然矣石門之事再見矣吁春秋之初天下之無王齊鄭之罪也而魯次之春秋之末天下之無伯齊鄭之罪也而魯次之吁春秋之斧鉞猶凛凛也宋魯交聘例文十有一年公子遂如宋成四年宋公使華元来聘五年仲孫蔑如宋八年宋公使華元来聘襄二年叔孫豹如宋十有五年宋公使向戌来聘二十年季孫宿如宋昭十有一年叔弓如宋十有二年宋公使華定来聘二十有五年叔孫婼如宋嗚呼宋魯春秋之望國也宋王者之後魯周公之後齊晉二伯必先結宋魯而後可以圖諸侯蓋卑於齊晉而隆於衛鄭陳蔡者也終春秋未甞有魯蔡交聘之事自文六年以後未甞有魯陳交聘之文鄭聘者一魯迄不報衛聘者四魯獨一徃魯於諸侯之邦交其闊略蓋如此宋人来聘者四来盟者一而魯之聘宋者五其禮畧有以相當者何乃闊畧於衛鄭陳蔡之諸侯而獨拳拳於一宋哉攷之春秋其初蓋出於晉魯覘宋之謀其後乃成宋魯交聘之實盟宿遇垂魯首親宋輸平而後黨鄭仇宋者十五六年寤生既歿㑹宋于虚㑹宋于龜驟合復離蓋未始有成盟也桓文迭伯旅進旅退於衣裳之㑹盟未始有特聘也文十一年襄仲如宋魯豈肯屈意而先下於宋哉厥貉之役楚謀弱宋宋人請平且道以田孟諸宋及楚平於晉罪也是時魯方睦於晉衡雍之盟襄仲與晉盾為深交親徃聘宋其為宋魯邪其専為晉邪其謀盖將以觀宋之從楚與否也新城之盟宋公首㑹未必非襄仲一聘之力華孫自知宋將有釁而定盟於魯冀他日有一手之援其来非特聘也繼此華元不来則宋魯徃来之使絶矣我成公之四年宋以華元来我以仲孫報則宋魯之交始合宋卿於是来聘納幣我卿於是如宋致女則宋魯之交始固繼又宋之聘我者二我之如宋者三則宋魯之交愈宻昭二十有五年之叔孫如宋而宋不報是年公在外而不獲報也元公不顧婚姻為公如晉至死不怠仁也景公即位不遣一介以通嗣君義也經書宋魯交聘絶筆於昭公之二十有五年隠然見宋公以仁義而結魯之意矣隠然見宋公内魯君而外賊臣之意矣樂祁利於納公蓋亦成先公結魯之志歟吾觀宋魯之交皆不偶魯於諸侯自齊晉以下皆畧之者彼隨来聘視其儀文之踈辭命之陋若凂焉未有如交宋之詳且悉者蓋魯秉周禮而宋亦善守先代故也荀偃有言諸侯宋魯於是乎觀禮晉且不可望况他國乎吁仁義以結之也禮以行之也晉且不可望而况乎衛鄭陳蔡也陳魯交聘例莊二十有五年陳侯使女叔来聘公子友如陳文六年季孫行父如陳嗚呼春秋書内聘莫詳於齊晉其次莫詳於宋其次則衞若鄭若蔡若許我未有徃聘之者也余獨於陳焉疑之文公以前陳聘者一我聘者二而經遽於此而絶筆焉甞因是而思之嗚呼魯秉禮之國也中國而中國則内之中國而外域則外之齊伯之十有二年陳使女叔来聘我使季友報之是時陳有奬齊之功楚無争陳之事陳猶中國之陳也不為荆楚之陳也從㑹盟征伐於諸侯而又通聘問於諸侯禮也圍陳納頓陳㡬折入於荆楚踐土如㑹執玉帛以從諸侯此出幽谷遷喬木時也我文公之六年行父不忘先子之志聘且結好焉魯之待陳猶前日也自楚宋伐陳見於傳晉盾侵陳見於經陳人已懐南北之志辰陵一㑹而楚盟之事作矣鄬役逃歸而晉討之文絶矣陳始決然南面於楚下喬木而入幽谷矣秦術来聘襄仲辭玉以晉故也陳貳於楚雖其来聘我肯受之乎不来我肯聘之乎經書魯陳交聘之文絶筆於文公之年者陳貳於楚故也蔡許不書聘鄭来而不報聘楚秦呉来而不報聘吾故曰魯秉禮之國也不然魯何獨厚於齊晉宋衞而薄於陳蔡鄭許哉或曰子則失矣魯以陳蔡鄭許之從楚而不往聘矣公如楚者二大夫如楚者一我復親往朝聘於楚者何故曰魯之秉禮以從晉也魯之從楚誰之罪也獨不見夫叔向告楚人之辭乎諸侯君實有之何辱命焉諸侯欲不從楚不可得也宋之㑹諸侯兩屬於晉楚申之㑹諸侯偏屬於楚魯耻不㑹則非魯之罪也諸侯之罪也豈獨諸侯之罪哉伯主之罪也楚来聘莊二十有三年荆人来聘文九年楚子使椒来聘襄三十年楚子使薳罷来聘昭六年叔弓如楚秦来聘文十有二年秦伯使術来聘呉来聘襄二十有九年呉子使札来聘嗚呼呉楚来聘許之乎非中國之諸侯不㑹盟不在㑹盟之國不通聘春秋之法也經書春秋諸侯之聘魯未有不㑹不盟而後聘也不與中國之㑹盟者楚呉也倐然来聘吾知其為何人哉荆人来聘君不書不知其君也臣不書不知其臣也不知其君臣則曰人而已齊桓之伯内外之界限素嚴也楚呉之君臣豈得使通於中國也春秋苐以其聘魯之善猶愈於入蔡伐鄭之惡書人進之矣猶書荆以别之乃若齊兵壓境屈完来盟若自盟然諸侯所不與也屈完書氏楚君之爵猶不見經也齊桓之伯内外之界限素嚴也後此有書楚子使椒聘者矣秦伯使術聘者矣書呉子使札聘者矣或者則曰此春秋書楚呉来聘之例也呉来聘之文春秋於此而絶筆焉前此楚人兩遣聘而不報薳罷之聘叔弓之徃純用中國報施之禮也嗟夫齊桓之伯寧至於此哉嗚呼齊孝宋襄啓楚者也晉文啓秦者也景厲悼啓呉者也平以伯授楚者也悲夫齊桓之不復見也春秋提綱卷六
