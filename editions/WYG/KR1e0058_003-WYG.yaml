body:
  text: 春秋提綱卷三宋陳則通撰侵伐門呉楚越兵爭例成七年呉入州來楚邑襄三年楚公子嬰齊帥師伐呉十有四年楚公子貞帥師伐呉二十有四年楚子伐呉二十有五年呉子遏伐楚門于巢卒昭四年楚子蔡侯陳侯許男頓子胡子沈子淮夷伐呉五年楚子蔡侯陳侯許男頓子沈子徐人越人伐呉十有三年呉滅州來十有七年楚人及呉戰于長岸二十有三年呉敗頓胡沈蔡陳許之師于雞父二十有四年呉滅巢三十年呉滅徐徐子章羽奔楚三十有二年呉伐越定二年楚人伐呉四年蔡侯以呉子及楚人戰于柏舉楚師敗績呉入郢五年於越入呉十有四年於越敗呉于欈李哀十年楚公子結帥師伐陳呉救陳十有三年於越入呉嗚呼甚矣晉人之以計中呉也始則教呉之叛楚而通其交終則俟楚之釁呉以絶其好甚矣呉人之以計中楚也始則攻楚之與國而令其疲終則去楚之與國而令其孤至今讀春秋者徒知呉病楚而已不知其謀楚之巧徒知晉通呉而已不知其譎呉之深也我宣公之八年楚人疆舒蓼盟呉越而還呉之為楚役舊矣呉未始叛楚也而教之叛楚呉未知戰陳也而教之戰陳呉未嘗㑹諸侯也而誘之會諸侯蒲之役不至雞澤之役不㑹跨海求好此非呉人之本心鍾離善道戚相之數㑹中國毎汲汲焉於呉者以晉方謀鄭楚驟爭之念諸侯莫可以制楚獨呉居肘腋能為楚患晉惟恐呉之釁不亟也州來之入呉始挑怨於楚鳩兹之克楚復結釁於呉兩雄相持莫肯先下晉遂得從容三駕以伐鄭楚不敢爭者畏强呉得以議其後也蕭魚以後楚方忿呉不復問鄭晉已得鄭不復恃呉昔也招而進之膝今也麾而置之地特未有辭耳襄公十有三年呉伐楚喪釁日已稔晉之謀國者亦曰呉日有事於楚不幸楚伐呉呉請師以救吾其能興師數千里以救之乎又不幸呉伐楚呉請糧以濟吾其能告糴於諸侯以予之乎從之我疲於奔命不從呉易以生怨不如因其伐楚喪也而退之我直彼曲不復有辭矣故十有一年㑹蕭魚十有四年㑹于向者晉不復恃呉故也不然無瑕可以戮人襄之二年晉師宋師衛寗殖同伐鄭喪使鄭人得以藉口尚何責於區區蠻夷之呉也哉此呉人堕晉人計中者也噫孰料楚人堕呉之計也哉楚無陳蔡鄭許則不能抗衡北方無荆州羣蠻則不能自保其國随人叛則不得志於漢東庸濮叛則申息之門不啟僻在荆山與蠻雜居號為長雄一有反噬徬徨四顧呉直海濵一微國耳以封境之大孰與楚以兵力之强孰與楚一旦伐巢伐徐又入州來楚人之右臂㡬斷一伐以子重襄三年再伐以子囊襄十四年東奔西救竟不得息肩子囊將死襄十四年傳凛然有朝夕及郢之憂然猶大夫奔命未聞楚子之親辱於呉也襄二十有四年楚子伐呉以無功返呉人自此有輕楚之志二十有五年呉子攻巢殪於一矢呉人自此有不戴天之讎非楚斃呉則呉斃楚不止也然前此楚人兩以大夫一以國君伐呉未聞楚子罷諸侯以有事於呉也楚靈怙其强暴卒㑹申之諸侯大而若陳若蔡若許小而胡沈頓夷之屬疾鞭而戰之明年又驅徐越而來謂目中必無呉矣卒不得志而去又明年逺罷有房鍾之敗楚人罷勞轉徙忘寢與食卒不能堪而為乾谿之事則呉人以計疲楚之效也熊居以來呉張益甚向者伐巢今遂滅巢向者伐徐今遂滅徐向入州來今遂敢於滅州來而楚人之藩籬空矣一戰於長岸而楚師敗再戰於雞父而六國之師敗楚人之黨與盡矣呉且用伍貟之計多方以誤楚楚人自徃伐於定公之二年諸侯不來呉已䇿楚之在其掌握中矣柏舉之役春秋不書入楚而書入郢者楚以羣蠻為國羣蠻盡則惟郢存焉耳傳自伐郯以後侵楚伐楚嵗不絶書經獨不書呉伐楚之文惟諸樊隕巢書伐楚以致其志其他書入州來滅州來滅巢滅徐而遽以入郢書者吾是以知楚人以諸蠻為國也雖然呉方在楚越又入呉何禍亂之相尋至此耶楚靈率諸侯伐呉越大夫夀過㑹其役楚子率舟師略其疆越大夫胥犴出勞王則越之仇呉楚實使之昭之三十有二年呉始以伐越書定之五年越始以入呉告十有四年越又大敗呉於欈李上國諸侯方以呉為憂不知東南又有一越矣勾踐歸玉帛於呉歸臣妾於呉如豢牲牢俟日而用之黄池之爭未已越已輕兵間道造其國都矣此又非越人之以計中呉耶嗚呼呉以計中楚越又以計中之呉以力勝楚越又以力勝之春秋書於越入呉於柏舉之後再書於越入呉於黄池之後戒哉戒哉好用兵亟戰者宜有以鑒乎此齊伐魯例桓十年齊侯衛侯鄭伯來戰于郎十有七年及齊師戰于奚莊九年公伐齊納糾及齊師戰于乾時我師敗績十年公敗齊師于長勺十九年齊人宋人陳人伐我西鄙僖二十有六年齊人侵我西鄙公追齊師至酅弗及齊人伐我北鄙公以楚師伐齊取穀文十有五年齊人侵我西鄙齊侯侵我西鄙十有七年齊侯伐我西鄙成二年季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰於鞌齊師敗績襄十有五年齊侯伐我北鄙圍成公救成至遇十有六年齊侯伐我北鄙齊侯伐我北鄙圍成十有七年齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防十有八年齊師伐我北鄙公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊二十有四年仲孫羯帥師侵齊二十有五年齊崔杼伐我北鄙定七年齊國夏帥師伐我西鄙八年公侵齊公至自侵齊公侵齊公至自侵齊齊國夏帥師伐我西鄙哀十年公㑹呉伐齊十有一年齊國書帥師伐我公㑹呉伐齊齊國書帥師及呉戰于艾陵齊師敗績獲齊國書嗚呼魯天下之望國也立乎諸侯有冠冕佩玉之氣象諸侯之所尊敬而未有謀害之者齊我乎大邾莒我乎小之三國者曷為屢以侵伐書耶攷之經邾之伐我必南鄙邾在魯之南者也莒之伐我必東鄙莒在魯之東者也齊之伐我必西北鄙齊在魯之西北者也然而邾小於莒莒小於魯俱非魯之所畏服焉者獨齊視魯為大其為魯患亦不細予得而備論之春秋之初齊魯為敵國齊不弱魯不足以强齊春秋之中齊晉為敵國魯不恃晉不足以庇魯春秋之末齊呉為敵國呉不得魯不足以伯呉齊强而魯之衰也晉强而齊之衰也呉强而晉之衰也此三變不直係之魯王室諸侯一時國勢之盛衰皆於此焉係吁可畏哉魯入春秋首交邾宋次挾蔡衛與齊鄭為敵國鄭來輸平正以離宋魯之黨繼盟于艾又以合齊魯之交伐宋入許何役之不從至桓公之三年又使姜氏撫有其國人見齊君之汲汲於魯不知魯國之强正齊君之所甚忌也郎之戰胡為乎來哉奚之役何辭以加我哉不過加兵於魯以弱之也猶有公子彭生拉幹之事安得而加之公不惟弱魯而又弱周莊公不於此時礪復讎之戈低首下心忍與之周旋諸兒既死春秋始有公伐齊之文不書納糾人或疑其復讎上書納糾下書𦵏齊襄公子同萬古有餘辠矣乾時之敗公幸而免既為公諱師敗績尚何足諱哉我師敗績之後魯弱不可復振長勺之勝無補於事齊伯將興魯何能為役役㑹盟猶未免於三國之討至孝公齊少懦矣西鄙之侵來不敢禦追又不敢及僖公之恥莫大乎以一國畏矣此非懲莊公乾時一敗而然耶齊又不道伐我北鄙且國内豈不足乃卑卑然使東門遂奔荆蠻以請師雖有伐齊取穀之功不足以盖棄親即讎之辠魯乞師於諸侯春秋不書此特書曰公子遂如楚乞師魯之衰可嘆也已晉人世伯敝邑介在東表宻邇仇讎寡君將晉是望齊人兩侵一伐晉曾不以手援之㳂及宣公甘心向齊㑹於齊朝於齊從伐萊於齊惟得免於討之為幸晉人畏齊晉之匹兵出勝負猶未可知文十有五年齊人侵魯明年魯受齊盟晉置齊魯於不問者二十年郤克忿帷房一笑之辱請伐齊不許請以私屬不許無他畏齊晉之匹也斷道一盟方爾北鄙之伐何為臧宣叔如晉乞師其時郤子為政薄言徃愬逢彼之怒不然晉人詎肯為魯出師耶魯人掃竟興師四卿並出此一役也將封疆社稷是以若其不捷晉之表裏山河固無害魯在齊之宇下其危哉其患顧不特西鄙北鄙而已春秋内大夫㑹伐例不過一卿此書四卿帥師㑹晉郤克見魯於是役凛凛也一戰勝齊遂取汶陽魯則快矣齊君之怒猶未已也以晉故蓄憾於魯而不敢泄者三十有二年悼公末年晉伯已怠平公新立未狎諸侯襄十五年以後齊侯伐我者四而書圍者三髙厚伐我而書圍者一繼又用大師以加之我者一春秋稱君辠其君也稱其大夫辠其大夫也稱師辠其師衆也此所以致諸侯同圍之師歟予謂魯之仰晉也常急而晉之救魯也常緩文十五年齊人病我不即救後二十有二年始有鞌之師非救魯也郤克為婦人之笑辱也襄十五年齊又伐我不即救後四年始有東閭之役亦非急魯也唯荀偃之妖夢是踐也襄之二十五年崔杼來伐齊人摩厲以須莊公矣不善之積出乎爾者反乎爾者昭公暨平齊魯得以無事景公乘晉氏之失霸也兩使國夏來伐我定公於是為夾谷之㑹向暨齊平猶不得已今及齊平我欲之非不得已諸侯無伯之辭也齊方得魯豈料呉人勢强力大又有過於齊者哉哀公八年呉伐我為城下之盟而還魯自是役屬於呉不敢背二十年公㑹呉伐齊十一年又㑹呉伐齊呉召魯而魯徃㑹之也艾陵之戰上書公㑹呉伐下書齊及呉戰而公不與焉者豈非呉人伐齊未知其曲折但使魯人鄉𨗳之乎是故呉之霸魯成之也予不暇於邑於呉而獨於齊魯乎責備之春秋自僖以來齊人侵伐之筆相望於史魯獨三書侵以報之兩書至以危之魯畏齊不足以為魯矣自哀以上書齊人伐我西鄙否則伐我北鄙鄙者猶有逺魯之辭哀十一年獨書國夏帥師伐我已有直至城下之辭齊之廹魯已不容魯矣雖然疆場之事一彼一此亦不必論春秋告夕晉伯已衰齊當伐魯而失之者一魯當伐齊而失之者亦一季氏逐君君自歸於齊使齊人鳴鐘鼓以討意如之辠復昭公於國執意如歸之京師則天下之伯當不在晉而在齊奈之何信梁丘據之邪言而止為惠不終齊之失伐魯者一也陳恒禍齊夫子沐浴而朝請討之使魯人建斾於齊問簡公之故以魯之衆加齊之半何患不克天下之伯當不在諸侯而在魯奈之何制於三家之權臣而止則見義不為魯之失伐齊者一也嗚呼齊魯而如此將王者之事不止一伯耳孟子何以曰春秋無義戰魯伐邾例隠七年公伐邾桓八年伐邾十有七年及宋人衛人伐邾僖二十有一年公伐邾二十有二年公伐邾取須句及邾人戰于升陘三十有三年公伐邾取訾婁公子遂帥師伐邾文七年公伐邾取須句遂城郚十有四年邾人伐我南鄙叔彭生帥師伐邾宣十年公孫歸父帥師伐邾取繹襄十有五年邾人伐我南鄙十有七年邾人伐我南鄙十有九年晉人執邾子取邾田自漷水二十年仲孫速帥師伐邾哀元年仲孫何忌帥師伐邾二年季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田三年叔孫州仇仲孫何忌帥師圍邾六年仲孫何忌帥師伐邾七年公伐邾入邾以邾子益來嗚呼魯之於邾三辠焉黨强而陵弱不義間大而伐小不仁舎内而圖外不智藐焉一邾介於齊宋魯之間將恃大國之安靖已翦為仇讎豈惟邾之辠吾讀春秋初年之簡曰公及邾儀父盟于蔑七年公伐邾深歎夫春秋諸侯之盟俱不足恃也春秋之初宋魯一黨五年邾人鄭人伐宋六年鄭人來輸平而魯猶未能忘情乎宋也故為宋伐邾以媚之鄰國相望擇其强可以托交者是從魯之執事豈其顧盟桓十有七年公及邾儀父盟于趡矣春盟而秋伐之盟安在哉左氏於隠七年之伐邾為宋討於桓十七年之伐邾為宋志然則魯宋役耳邾人兩受魯盟無一足恃自後凡霸主齊盟之外不復受盟於魯者一百六十有五年則黨强陵弱不義之罪隠桓二君實當之北杏之㑹邾人實來齊伯三十餘年邾魯之境得以少事宋襄代興曹南之盟僖十九年邾首從之介恃宋公以憑陵諸侯蕞爾小國乃使鄫子㑹盟執鄫子而用之邾不有宋何恃乃爾鄫魯之親也魯以宋人方伯之故猶未之問奈何又討須句傳僖二十年邾人滅須句舉皥濟之祀而墟之魯至是始不能堪矣僖二十有一年楚執宋公於盂公乘齊伯之不復也宋人之有楚患也今年伐邾明年又伐邾嗚呼邾可伐也魯獨為無辠耶春秋明道不計功正誼不謀利果以伐邾為是則僖公宜得崇明祀保小寡之褒矣今其書但與伐國取邑之辠同則魯君之利在於取須句不在於復須句邾取而邑之魯又取而邑之耳春秋誅意之筆可欺也哉升陘之役春秋諱之僖公乘時徼利自取喪師之辠大為諸侯羞迨晉重耳告終僖三十三年之明年秦師新退公伐邾取訾婁猶未快也又有襄仲之師晉驩告終文七年之明年嫡嗣未定文又伐邾取須句猶有懼也又為城郚之役未免間大國以陵虐小國文十有四年邾有南鄙之伐我有惠伯之師二國之憾未釋也不五年邾子來朝宣元年邾豈忘前日之怨而下魯哉是時宣公折莭事齊而邾亦齊屬也以齊故邾魯釋憾僅僅十年乘齊有惠公之喪伐邾而取繹宣十年遽使子家如齊謝伐邾之罪人亦有言抑君似鼠晝伏而夜動則間大淩小不仁之辠僖文宣三君實當之成公以後邾常役於齊齊服晉則邾亦服魯五年齊與蟲牢之盟邾子明年來朝十七年齊與柯陵之盟明年邾又來朝無他齊服於晉故也齊君叛晉則邾亦叛魯襄十五年齊侯伐魯鄙之北則邾人攻其南十七年齊侯伐魯鄙之北邾人又攻其南無他齊叛於晉故也受命於齊而來伐魯邾人之辠猶減於齊魯告於晉晉人為執邾子襄十年亦足矣魯何為而奪之地取邾田自漷水亦多矣魯何為而又伐其國襄二十年仲孫速伐邾盖是時三家專政公若不聞公直寄生之君耳襄公二十一年在晉季孫敢受庶其之地昭公在乾侯季孫又納黒肱之邑三十一年襄公以後邾多叛臣襄二十三年邾畀我昭二十七年邾快惟魯受之惟春秋誅之厯見其以惡黨惡之辠隠公行朝禮於魯奔定喪於魯將何以辠哀公元年一卿伐之二年三卿復伐之魯擊柝聞於邾一撮之土寧不相容向取邾田猶以漷水為限今自漷以東并取之且曰及沂西田取而言及浸淫無厭之辭也不思公室四分為日久矣雖取百邾無益於魯沂漷何為舎内圖外不智之辠襄昭以下之君實當之予嘗論之魯之取邑於邾為多魯卿伐邾於哀為多至哀公七年書曰公伐邾嗚呼魯自宣公十有八年公自出伐之文絶矣今公伐邾不知公之為季孫歟季孫之為公歟以邾子益來不知公之為邾子歟邾子之為公歟吾不忍言之也春秋提綱卷三
