body:
  text: 春秋提綱卷五宋陳則通撰朝聘門公如京師例僖十有二年公朝于王所壬申公朝于王所成十有三年公如京師公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦公如齊例桓十有八年公與夫人姜氏遂如齊莊二十有二年公如齊納幣二十有三年公如齊觀社二十有四年公如齊逆女僖十年公如齊十有五年公如齊三十有三年公如齊宣四年公如齊五年公如齊九年公如齊十年春公如齊夏公如齊公如晉例文三年公如晉十有三年公如晉成三年公如晉四年公如晉十年公如晉襄三年公如晉四年公如晉八年公如晉十有三年公如晉二十有一年公如晉昭二年公如晉至河乃復五年公如晉十二年公如晉至河乃復十有三年公如晉至河乃復十有五年公如晉二十有一年公如晉至河乃復二十有三年公如晉至河有疾乃復二十有八年公如晉次于乾侯二十有九年公如晉次于乾侯定三年公如晉至河乃復公如楚例襄二十有八年公如楚二十有九年公在楚昭七年公如楚嗚呼朝宗覲遇周制也自天子不能錫命諸侯而采菽之詩作諸侯不欲朝王而菀栁之刺興春秋諸侯例不朝覲自幽王始豈特東遷之君為不振哉鄭人交惡驟爾朝桓周桓公有善鄭以勸來者猶懼不蔇之言其視鄭莊之來望外之幸也嗣是而後鄭不朝王者十年無諸侯何以為共主無朝覲何以為天子王始不勝其忿自將以伐鄭將以號令諸侯也鄭不服而至於戰戰不勝而至於敗自此周人不敢以朝禮問諸侯矣禮稱諸侯三年喪畢以士服入見天子天子錫之圭璧黻冕然後歸今也不然文成襄定以畢服而朝晉昭以踰年而朝晉則即位朝王之禮缺矣書稱月正元日覲四岳羣牧班瑞于羣后今也不然僖宣以正月而朝齊成襄以正月而朝晉則正月朝王之禮缺矣愚按春秋之法為諸侯而不朝天子在春秋當服不恭之辠而王室尚存也為諸侯而復朝諸侯在春秋當服無將之刑而王室不存也春秋義為魯諱公之初如齊也春秋有其事公之初如晉也春秋無其文如齊如晉而又如楚聖人亦無如之何矣公如外國經未有繁其辭者也桓之十有八年既曰如齊矣又曰與姜氏明公之與姜氏非專如齊也荘之二十有二年既曰如齊矣又曰納幣明公之為納幣非為如齊也由是而觀社由是而逆女既曰如齊而又書其故皆春秋筆法之所無者大抵以婚姻之事譏公未嘗以朝齊之事辠公也聖人慎之重之而惡其犯之也繼又僖之如齊者三宣之如齊者五雖欲慎之重之而無其詞矣公如外國經未有不書者也文二年之如晉隠而不書雖則諱處父之盟其實諱公之始朝晉也諱公之始朝晉而取是辱也繼又公之如晉者二成之如晉者三襄之五昭之九定之一諱之不可勝諱則有書之者矣如齊其初也如晉其次也如楚其末也春秋著其事於初隠其文於次皆不可得則末流其可勝救哉攷之周典諸侯未嘗無殷聘世朝之法然而有天子在不朝王室而朝諸侯意謂何哉入春秋九十有二年未嘗北面京師踐土河陽天威咫尺不得不朝相距又五十有三年伐秦之役惟晉是從不過先告晉侯之意經書曰如是魯以列國例京師矣經書魯於諸侯之朝例曰如諱其朝也於京師之朝例曰如辠其以列國例京師也二百四十二年書朝者二如者一迄未有公朝於京師之文何周之衰耶抑魯公之不朝不特係王室之盛衰而亦係魯國之輕重焉春秋甫降齊伯未興魯視諸侯為强四十一年間未嘗有事他國之禮齊伯既興魯何役不㑹何盟不同三十二年間亦未嘗有專朝伯國之事自僖之十年移事周之禮而事齊魯寖取輕於諸侯矣僖公即世晉人遽以不朝來討則慢魯之始也自是文之如晉也而見止且有大夫之盟宣之如齊也而見辱且有叔姬之請成之如晉也而又不敬且有從楚之欲襄公值晉悼方明諸侯方睦僅得免焉推原其由則文之二年移事齊之禮而事晉魯寖取慢於諸侯矣魯以周公伯禽之後為望國龜䝉鳧繹之封為不小公車千乘之賦為不弱昭公行禮於晉見止者二見辭者四書疾以殺恥者一以禮下人而人不容以身事人而人不顧迹所從來襄之二十八年移事晉之禮而事楚魯寖取厭於諸侯矣輕而至於慢慢而至於厭皆魯人不能秉禮之過也抑魯公之朝不特係魯國之輕重其亦係世道之升降伯業之盛衰强弱焉僖之朝桓乃㑹於葵丘之明年王室之卑而齊伯之崇也文之朝襄乃戰於彭衙之嵗齊伯之絶而晉伯之續也終宣公之世事晉蔑如晉不敢問是時楚荘圖伯於南齊惠結魯於東晉方懼楚不敢敵齊晉伯之小弱也晉悼方興伯業猶競盟宋以後楚執牛耳外而陳鄭如楚内而魯衛如楚至於章華落成昭七年楚大夫敢於有魯侯之召則晉伯之已去也夷攷春秋書法之三變其事專係於魯攷春秋世道之三變其事不獨係於魯予讀經至魯襄公之末為之三歎小國來朝例隠十有一年滕侯薛侯來朝桓二年滕子來朝杞侯來朝六年紀侯來朝七年穀伯綏來朝鄧侯吾離來朝九年曹伯使其世子射姑來朝十有五年邾人牟人葛人來朝莊五年郳黎來來朝二十有三年蕭叔朝公二十有七年杞伯來朝僖五年杞伯姬來朝其子七年小邾子來朝十有四年季姬及鄫子遇于防使鄫子來朝二十年郜子來朝二十有七年杞子來朝二十有九年春介葛盧來冬介葛盧來文十有一年曹伯來朝十有二年杞伯來朝滕子來朝十有五年曹伯來朝宣元年邾子來朝成四年杞伯來朝六年邾子來朝七年曹伯來朝十有八年杞伯來朝邾子來朝襄元年邾子來朝六年滕子來朝七年郯子來朝小邾子來朝十有八年白狄來二十有一年曹伯來朝二十有八年邾子來朝昭三年小邾子來朝十有七年小邾子來朝郯子來朝定十有五年邾子來朝哀二年滕子來朝嗚呼禹合諸侯於塗山執玉帛而朝者萬國今其存者無數十焉松柏之下其草不殖國小而偪其能久乎是故諸侯之朝魯者衆而皆小國也畏大國不獲已是以來也春秋録小國之朝悲之也悲其無以自存而依人以為安也夫以弱國小衆介於大國之間奔走於時命困頓於兵役不能自拔於微弱之中而列於諸侯之盟㑹者滔滔皆是齊桓始霸曹邾皆列衣裳之㑹者幸也滕子在盟乍見而遽没其餘小邾薛杞之屬自成襄以後稍稍得通盟㑹於中國前此魯史七君春秋更一百二十年皆無以自見者若蕭若介若郯終春秋咸無焉此太陽當夕微茫小星雖見而無光或乍見而遽没或埋没而不見竟不得略列於三五次舎之地諺曰蕞爾小國未免類此若來朝不書誰知其有國矣春秋書小國之朝悲其無以自存而幸其猶未亡也春秋之末諸姬垂盡曹文昭也不得免焉視昔日之諸姬來朝魯者獨有區區之滕厯春秋而及戰國微國之朝始滕終滕此夫子作春秋之微意嗚呼微國之朝豈得已哉鄭人曰曹畏宋邾畏魯也宋人曰滕薛郳吾役也晉人曰滕薛小邾之不至皆齊故也嗚呼不寧惟是也鄫畏邾也杞畏莒也紀畏齊也郜畏宋也郯畏呉也穀鄧之畏楚也介葛牟之畏東夷也畏大國不獲已是以來也國風始於邶鄘終於曹鄶春秋始於邾宿終於既滅之陳許此聖人拳拳於微國也始於邾宿春秋崇明祀保小寡之意也終於既滅之陳許春秋興滅國繼絶世之意也嗚呼詩亡而春秋作也春秋亡而吾無復望矣王臣聘魯例隠七年天王使凡伯來聘九年天王使南季來聘桓四年天王使宰渠伯糾來聘五年天王使仍叔之子來聘八年天王使家父來聘莊二十有三年祭叔來聘僖三十年天王使宰周公來聘宣十年天王使王季子來聘魯大夫如周例僖三十年公子遂如京師文元年叔孫得臣如京師八年公孫敖如京師不至而復九年叔孫得臣如京師宣九年仲孫蔑如京師襄二十有四年叔孫豹如京師昭二十有二年叔鞅如京師嗚呼先王聘問之禮陵遲而至於春秋極矣盖嘗上下春秋之世變而思其故隠桓之世周不自知其為周諸侯事天子之禮周反用之於魯荘僖以下周始知其所以為周而天子令諸侯之權周迭移之於伯禮用於魯魯惟知魯之尊而已權一移於伯則魯惟伯令之從於周室何有哉東周甫降伯圖未興周流列國惟魯為强首交邾宋次挾蔡衛與齊鄭為敵國鄭平以來猶自持重未嘗遣使如諸侯而齊君之介弟實來未嘗遣使如京師而天王之貴卿踵至當是時大國莫如齊太上莫如周魯獨晏然受其聘而不報天下之尊寧有二魯者乎凡伯之來隠之七年也越二年而南季來矣此比年一聘之制也伯糾之來桓之四年也越明年而仍叔之子來矣較比年一聘之制又密也仍叔之子來則桓之五年也越三年而家父來矣此又三年一大聘之制也上採之禮下摭之傳此皆諸侯事天子之文周人不知乃倒置而用於侯邦之魯當時諸侯見天王之如此其尊魯也上國之聘不之周而之魯小國之朝不之周而之魯周以周之權而假之魯則諸侯固不得不尊魯也周人疊五聘之勤魯君無一介之報周殷勤以通之我傲惰以受之周人始悔其不能自重之過自此王臣不下聘者七十有四年則治其不報之辠也乃若荘之二十有四年祭叔來聘私來也非天王使之也嗚呼今而後周人始知其為周矣公不朝於踐土則宰周公不來矣仲孫不至京師則王季子不至矣奈何周始知其所以為周而周復失其所以為周齊晉楚呉比次而起諸侯奔走伯令之不暇何暇問及東周哉公如齊者十有二大夫如齊者二十有三公如晉者二十大夫如晉者二十有五公如楚者二大夫如楚者一寥寥二百四十二年之間魯紀無聘周之文亦無實聘周之意公子遂之聘非魯意也報周公也叔孫得臣之聘非魯意也因毛伯也仲孫蔑之聘亦非魯意也因徴聘而徃也文九年之得臣非聘也襄王之𦵏不得不徃也昭二十有二年之叔鞅非聘也景王之𦵏不容不㑹也攷之春秋經無聘周之文而魯有聘周之實獨襄之二十有四年叔孫豹之事耳豹魯之忠臣也謂魯不可以無禮於周固請為是行矣自宣以後冠盖不入天王之邦者五十有一年既不合於古先王制聘之期則巧為之辭曰賀而已終春秋何嘗有聘周之事哉然而魯人卑周之辠猶未著也大夫之如京師者六魯之冢宰曾不一徃季孫實執魯柄周使於齊晉諸侯之間二十有一擇重而行彼之視周蔑如也故經無季孫如京師之文其使他卿不過鄭人遣印叚之意若以春秋誅意之法繩之則尤可辠也嗚呼吾故悲夫天子一失而用於魯又悲夫天子之權再失而移於伯也吾又重歎夫魯之卑周曾不如曹滕二邾也雖然吾幸而有春秋之斧鉞在齊魯交聘例隠七年齊侯使其弟年來聘桓三年齊侯使其弟年來聘僖七年公子友如齊十有二年公子友如齊二十有八年公子遂如齊三十有三年齊侯使國歸父來聘文元年公孫敖如齊十有七年公子遂如齊十有八年公子遂如齊季孫行父如齊宣元年季孫行父如齊公子遂如齊八年公子遂如齊至黄乃復十年公孫歸父如齊季孫行父如齊公孫歸父如齊齊侯使國佐來聘成十有一年叔孫僑如如齊襄二十年叔老如齊二十有七年齊侯使慶封來聘昭九年仲孫貜如齊定十年叔孫州仇如齊哀五年叔還如齊嗚呼先王制聘問之禮豈以其國之强弱大小為哉何魯之詳於伯主而略於列國也嘗上下春秋而考其故召陵以後魯始事齊未始事晉謂諸侯不足以抗齊也城濮以後魯始事晉而又事齊謂齊權之猶足以抗晉也鞌以後魯之事齊寖簡事晉寖繁知晉伯之真足以弱齊也入東周來魯甚持重小國朝之大國聘焉齊君兩遣介弟之來而不報齊猶媚魯魯甚無畏乎齊也二鄄二幽以後諸侯既授齊以伯魯獨晏然無事於齊大夫行李不出疆埸者七十餘年召陵之役震動中華始信齊侯有攘外服尊王室之功七年季友如齊則我聘齊之始也十年公如齊則我朝齊之始也繼又友徃聘焉公徃朝焉當是時大侯小伯靡然從齊晉人倔彊一方吞諸姬以自封殖贄幣不交於諸侯諸侯未嘗遣一介過而問焉者不啻秦人之視越人也小白即世諸侯泛泛然無所統屬聘問不相徃來城濮之役齊桓二十餘年所經營之事重耳以一日之力辦之諸侯於是乎再合而魯之奔走又在晉矣然而魯猶未也踐土之㑹雖從於晉襄仲之聘不之晉而獨之齊則魯之未能忘情乎齊也盖齊魯皆東諸侯然齊大於魯親於魯承齊桓之伯其遺威餘烈猶有以動人者雖魯不能無畏之也晉文朝死國子夕來此豈平常聘問之比哉將以覘魯也將以召魯也殽之役晉人得志魯且不畏晉而朝齊設有不幸伯業望望然去矣文公即位之元年先遣穆伯徃告於齊次年公始如晉而猶忌於齊也衰絰之未終亟欲如齊納幣於齊以自托襄仲之行何若是其急遽哉宜齊晉之若兩伯也十有五年齊執單伯我告於晉而晉不聞齊役西鄙我告於晉而晉不救魯人始謂不惟我畏於齊晉亦有畏於齊襄仲立宣之謀不於晉乎請而於齊乎請舉足左右已有輕重兩介如齊盖春秋所驟見之文也子惡之卒捷之立役役於齊終身焉晉毎藉衛以致魯魯終背晉以事齊是時楚莊經營南方之諸侯齊惠又深結東方之魯晉人旰食方為楚故何暇更生一敵於齊哉公如者五大夫如者七齊惠挾其大有造於魯晏然受其朝聘而不報至易世而國佐始來魯於是始悔其行矣抑人亦有言火中寒暑乃退此其極也能無退乎鞌之戰齊為晉弱魯始折節而事晉公卿大夫相繼於朝史不絶書謂不徃齊讎我必甚僑如黽勉於十有一年之行齊亦忌晉蓄憾於魯而不敢發者三十有二年晉悼之末年伯志已倦齊亦無奈晉何而數致怨於我東閭之役齊弱抑甚武子歸而作林鍾又幸中之再幸也叔老之行盖亦昔遣僑如之意歟成聘者一襄聘者一昭定之聘各一胡為乎昔之密而今之踈也昔之事齊謂齊權猶足以抗晉而今反見弱於晉謂齊權足以庇魯而今反不能自庇其國我又何必乎數數然哉予讀二百四十二年之事而釋之曰隠桓之世齊魯敵也荘始從齊者也僖始事齊者也文宣事晉而復事齊者也成襄昭事晉而半事楚者也定哀事呉越者也噫甚矣春秋不復作矣春秋提綱卷五
