body:
  text: 春秋提綱春秋類提要臣等謹按春秋提綱十卷舊本題鐵山先生陳則通撰不著爵里亦不著時代其始末未詳朱彛尊經義考列之劉莊孫後王申子前然則元人也是書綜論春秋大旨分門凡四曰征伐曰朝聘曰盟會曰雜例每門中又區分其事以類相從題之曰例然大扺參校其事之始終而考究其成敗得失之由雖名曰例實非如他家之説春秋以書法為例者故其言閎肆縱橫純為史論之體蓋説經家之别成一格者也其雜例門中論春秋為用夏正猶堅守胡安國之説然安國解文公十四年有星孛于北斗解昭公十七年有星孛於大辰全襲董仲舒劉向之義則通災異例中獨深排漢儒事應之謬則所見固勝於安國矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋提綱原序春秋一經説者亡慮數十百家其皆繪天地而圖日月似則似矣於化工之妙容光之照則亡也愚讀是經茫無津涯及見此編櫽括諸傳苞舉無遺頗於聖人之意若滄海之有畔可以濟其濶而極其際伏讀之餘因思儒者之行聞善以相告也見善以相示也不敢自祕願與同學是經者共之故用鋟梓以廣其傳至於編中之所本者則有諸傳在熟讀諸傳以求經之旨而於此編以發經之藴信所謂提綱者矣大比之嵗夏四月丙戌旴江後學胡光世書於石泉書院以附是編之後記嵗月云耳
