body:
  text: 春秋提綱卷十宋陳則通撰雜例門魯宫室僭侈例隱五年九月考仲子之宫莊二十有三年秋丹桓宫楹二十有四年春王三月刻桓宫桷二十有九年春新延廄僖二十年春新作南門文十有六年毁泉臺成六年二月辛巳立武宫定元年立煬宫二年冬十月新作雉門及兩觀嗚呼吾讀漢儒之記禮而深悲之成王周公之用心終不暴自於天下後世而伯禽亦為之誣也久矣其言曰成王命伯禽世世祀周公以天子之禮樂故太廟象天子之明堂庫門象天子之臯門雉門象天子之應門後之讀記者亦曰成王以此命之魯也不知漢儒之為此說其源流蓋自讀春秋之誤也彼見夫春秋之於祭祀也則有郊禘之文於宫室也則有延廄南門雉門兩觀之書遂從而附㑹之謂魯人可得以用周禮不知春秋正譏魯人之不得以用周禮也延廄法廄南門法門雉門兩觀皆非諸侯所有春秋一是以新書之蓋譏其新必有譏其故者矣新者因其故而治之不悟先公之惡其罪小新作者盡廢其故而復為之效尤先公之惡其罪大先公為之已知而改之以復諸侯之舊足矣或曰若子之言春秋不以毁泉臺之例譏之乎吁泉臺之築不至於僭先君為之己勿居之則可毁之則太甚若夫延廄南門雉門兩觀則有天子之制在豈得與先公泉臺比乎使魯有賢子孫毅然改之以復周公伯禽之法度以聳四方諸侯之觀聽春秋當何如其褒也縱不能改勿修可也今又新之以彰先君之惡春秋寧不責於為人之子孫者乎或又曰臯門有伉應門將將雖古公亶父猶為之諸侯為之無害也吁大不然臯應二門雖立於古公為諸侯之時逮武王克殷周公制禮遂定為天子宫闕之制豈有既為天子之制而復假於諸侯者此成王之所不當豫而伯禽之所不敢受也考之春秋周公子孫不克守先代典籍不惟上紊天子宫闕之制其亦紊諸侯宗廟之制諸侯廟制二昭二穆與大祖而五禮也成公六年立武宫大非宫廟即逺有毁無立之意卒使意如效閭巷小人之謀禱于煬公以冀非望之福逮定公立又為立宫以媚之宗廟舊制大為姦臣所破壞哀公何時桓僖之宫猶不之毁季氏擅國之私一至此乎不惟紊諸侯宗廟之制其又紊夫人祔姑之制妾母有妾祖姑則祔於妾祖姑無妾祖則易牲而祔於女君禮也隱公五年則祀仲子用諸侯之羽數而萬於妾母之宫經書曰初前此未之見也仲子别宫猶可僖公禘大廟致夫人則成風竟得以祔於廟矣仲子之書字猶可文公之簡書夫人風氏薨葬我小君成風則妾母竟得以稱夫人小君矣其後敬嬴定姒齊歸之例且踵踵矣不知周公魯公娶於薛惠公娶於商自桓以下娶於齊其肯合食於廟乎嗚呼宫闕之制壞則君臣夷也宗廟之制壞則昭穆混也夫人祔姑之制壞則嫡妾均也其他丹楹刻桷之侈譏之不可勝譏吾無譏焉猶曰魯秉周禮也如是而為秉周禮也吾是以為諸侯羞也吾是以為世道歎也魯宫室災變例桓十有四年秋七月壬申御廩災僖十有五年九月己卯晦震夷伯之廟二十有五年五月西宫災文十有三年大室屋壞成三年二月甲子新宫災三日哭定二年夏五月壬辰雉門及兩觀災哀三年五月辛卯桓宫僖宫災四年六月辛丑亳社災嗚呼春秋之於宫室也非僭禮不書非志災不書災之餘而再役也亦不書御廩不無作也大室不無修也新宫不無再營也考之春秋無復興役之文獨雉門兩觀災於定公二年之夏五而新作於二年之冬十豈雉門兩觀則有再役而御廩大室新宫魯人不復為之乎吁不然冝新不書必不冝新也而書之以見其侈冝作不書必不宜作也而書之以見其僭雉門天子之應門兩觀天子之外朝覩災不戒而又為之君子謂定公於是乎棄王度矣書災則造者之罪魯先君當之也書新作則復者之罪魯定公當之也春秋之於宫室豈徒志災而已災御廩而嘗非禮也新宫而哭非地也夷伯廟震有隱慝也大室屋壞志不敬也西宫之災暗室屋漏之地不可不謹也桓僖之災三家擅魯之私不可不禁也此猶可也至哀四年六月之亳社災天之示變於魯豈小也哉昔武王克殷使諸侯皆置殷社以為戒亳社災則天奪之鑒而魯亦隨之矣春秋志災亦止於此矣嗚呼宣榭火則宣王中興之迹無復望於周亳社災則殷人已覆之車將復見於魯悲夫春秋之於宫室也豈徒志災而已矣災異總例魯災異上魯災異下水旱外國災異附魯災異上日食星變隱三年春王二月己巳日有食之九年三月癸酉大雨震雷庚辰大雨雪桓三年秋七月壬辰朔日有食之既八年冬十月雨雪十有七年冬十月朔日有食之莊七年夏四月辛卯夜恆星不見夜中星隕如雨十有八年春王三月日有食之二十有五年六月辛未朔日有食之鼓用牲于社二十有六年冬十有二月癸亥朔日有食之三十年九月庚午朔日有食之鼓用牲于社僖五年九月戊申朔日有食之十年冬大雨雪十有二年春王三月庚午日有食之二十有九年秋大雨雹三十有三年隕霜不殺草李梅實文元年二月癸亥日有食之九年九月癸酉地震十有四年秋七月有星孛入于北斗十有五年六月辛丑朔日有食之鼓用牲于社宣八年秋七月甲子日有食之既十年夏四月丙辰日有食之十有七年六月癸卯日有食之成十有六年春王正月雨木氷六月丙寅朔日有食之十有七年十有二月丁巳朔日有食之襄十有四年二月乙未朔日有食之十有五年秋八月丁巳日有食之十有六年五月甲子地震二十年冬十月丙辰朔日有食之二十有一年九月庚戌朔日有食之冬十月庚辰朔日有食之二十有三年春王二月癸酉朔日有食之二十有四年秋七月甲子朔日有食之既八月癸巳朔日有食之二十有七年冬十有二月乙卯朔日有食之昭三年冬大雨雹四年春王正月大雨雹七年夏四月甲辰朔日有食之十有五年六月丁巳朔日有食之十有七年夏六月甲戌朔日有食之冬有星孛于大辰十有九年夏己卯地震二十有一年秋七月壬午朔日有食之二十有二年十有二月癸酉朔日有食之二十有三年八月乙未地震二十有四年夏五月乙未朔日有食之三十有一年十有二月辛亥朔日有食之定元年冬十月隕霜殺菽五年春王三月辛亥朔日有食之十有二年十有一月丙寅朔日有食之十有五年八月庚辰朔日有食之哀三年夏四月甲午地震十有三年冬十有一月有星孛于東方魯災異下隱五年九月螟八年九月螟桓五年秋螽十有四年春無氷莊六年秋螟七年秋無麥苗十有七年冬多麋十有八年秋有􅈮二十有八年大無麥禾二十有九年秋有蜚僖十有五年八月螽文八年冬螽宣六年秋八月螽十年冬饑十有三年秋螽十有五年秋螽冬蝝生饑成元年二月無氷襄七年八月螽二十有四年冬大饑二十有八年春無氷昭二十有五年有鸜鵒來巢哀十有二年冬十有二月螽十有三年九月螽十有二月螽水旱桓元年秋大水十有三年夏大水莊七年秋大水二十有四年秋大水二十有五年秋大水鼓用牲于社于門三十有一年冬不雨僖二年冬十月不雨三年春王正月不雨夏四月不雨六月雨三十有一年夏大旱文三年自十有二月不雨至于秋七月十年自正月不雨至于秋七月十有三年自正月不雨至于秋七月宣七年秋大旱十年秋大水成五年秋大水襄二十有四年秋大水外國災異莊十有一年秋宋大水二十年夏齊大災僖十有四年秋八月辛卯沙鹿崩十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都文三年秋雨螽于宋宣十有六年夏成周宣榭火成五年梁山崩襄九年春宋災三十年甲午宋災昭九年夏四月陳災十有八年夏五月壬午宋衛陳鄭災嗚呼自漢儒以春秋附洪範而後世之言天也誣矣一災則一事之應一異則一徴之召其言天人相與若甚密而不謬者何休之解春秋又祖其說而波蔓之嗚呼天乎若二三子之所見則小矣不曰春秋書災異而不言其故乎夫先事而至謂之異隨時而應謂之災春秋事應具存未嘗條而分之目而析之若漢儒之所言者日有食之不指其何物者缺其所不聞也孛入北斗必以有書者志其不常見也星隕如雨已隕之後其象何為隕石于宋方隕之初其物為何聖人未嘗不究其所以然而終不敢言其所以然為言之近於誣也聖人之重言天如此而况指某災某異而為某事之應哉隕霜殺菽舉重也隕霜不殺草舉輕也無氷燠甚也雨木氷寒甚也雨雹時或有之而大則為妖也震電雨雪天時之常而過則為災也其類如地震火災水旱之變為人君者盍引而自咎曰君道廢歟臣失節歟宮闈之不正歟民事多失和歟何變異之荐臻耶意者兵役繁興而不務職歟宫室過盛而不知量歟不然何以至此春秋書災異而不言其故正欲人君廣修德以應天也雖然天文之異雖可憂物象之妖深可畏鸜鵒吳禽也􅈮南越之妖也蜚亦魯國之所無也有之則為異故春秋書之曰有麋魯所有也有不為異而多則為異故春秋書之曰多螟螽蝝天下所多也多不為異而災則為異故春秋但書之曰螟螽蝝物反常為妖春秋謹之而又謹之者也或曰外災外異惟宋為多何邪宋魯乃赴弔相通之國其見於簡書最密仲尼於宋其聞之祖父也最詳史記有可得而書者春秋有可得而詳者石隕鷁飛蓋有不必告而告之者故春秋書外災外異莫詳於宋其他諸國至有廢興存亡不以告者矣災異云乎哉或又曰三國五季之世祥瑞之列於汗青者相望二百四十二年之春秋専書災異無一祥瑞之足言者何故春秋祥瑞不書惟有年則書今有年所以為上瑞也吁桓宣之世兩書有年春秋以為瑞乎以為異乎聖人以為喜乎以為憂乎盍思之鄭莊公之後五世兵爭按左氏莊公乃魯桓公十一年卒祭仲立公子突世子忽出奔衛十五年鄭伯突出奔蔡世子忽復歸于鄭是年九月鄭伯突入于櫟十七年髙渠彌弒昭公而立公子亹十八年齊人殺公子亹而轘髙渠彌祭仲迎鄭子于陳而立之杜云子儀也莊十四年傅瑕殺鄭子及二子而納厲公至此凡二十有二年始定晉昭公之後五世大亂初晉穆侯以條之役生太子曰仇即文侯弟以千畝之戰生曰成師即曲沃伯桓叔按左氏於桓公二年傳載魯惠公二十四年晉始亂故封桓叔侯於曲沃惠之三十年晉潘父弒昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨又載曲沃叛王王命虢公伐曲沃立哀侯于翼六年翼九宗五正頃父之子嘉父逆晉侯於隨納諸鄂晉人謂之鄂侯桓公二年春曲沃武公伐翼次于陘庭逐翼侯于汾隰夜獲之七年冬曲沃伯誘小子侯殺之八年滅翼冬王命虢仲立哀侯之弟緡于晉魯莊公十六年王使虢公命曲沃伯以一軍為晉侯翼按詩孔氏曰在平陽絳邑縣曲沃按詩孔氏曰在河東聞喜縣夏五闕文夏五者何榖梁曰傳疑也公羊曰無聞也杜預之解左氏亦曰闕文也無聞則無聞矣闕文則闕文矣傳疑者又何足以疑哉夏五而必繼之以月無疑也聖人於此既不難於一字之增而卒不敢者非有所不知也知而闕之者乃千萬世之信史也蓋春秋多闕文唯桓公之簡為甚春秋之左氏多闕傳唯莊公之簡為甚桓五年之甲戌己丑非以兩日赴也甲戌之下有脫簡耳四年之無秋冬七年之無秋冬非聖人削而去之也桓公之春秋多闕文矣左氏有經而無傳者尚多有之獨莊公自元年以後大半失傳自十九年以後空一年之經而失傳或纍數年之經而傳皆無之以迄於莊公之未疑有墜失之最甚固不止如成公二年夏月之闕文也傳且如此况聖人之經乎况聖人所修之舊史乎冝夏五之闕矣夫子以前為舊史為舊史之闕文夫子因之遂為聖經之闕文史之所闕者聖人且不得而增經之所闕者學者其可得而議之哉嘗考杜預之解左氏每遇闕文則曰史闕文也范寧之解榖梁每遇闕文則曰寧所未詳獨何休之解公羊以為春秋皆無闕文隻字片簡偶有墜佚則曲為之說以附㑹於經桓十七年之五月不書夏則曰非闕文也月不繫時者文姜不繫之桓也僖二十八年之冬有壬申之日而無月則曰非闕文也日不繫月者諸侯不繫之周也昭十年之無冬則歸咎於昭公之不郊定十四年之無冬則歸咎於季桓之受女樂失馬逺矣而執塗之人曰馬之失也職女之由此皆不近人情之論凡某闕文皆有論證至夏五不得其說則置然而不敢解休也生平之技始窮矣然則春秋不書者其皆闕文乎隱十年之無正桓十有四年之不書王定元年書春王而無正月若此者亦闕文乎若盡以夏五之例而例之則聖人筆削之意隱矣學者之解釋經疑冝於此審訂之但不當如何休之附㑹以春秋皆無闕文至夏五不得其說以為後世笑元年春王正月孟子謂晉之乘楚檮杌魯春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣孔子取春秋之名者取其義也蓋王者而後改元諸侯改元非正也諸侯有世無年有某事則繫於某王某年之下據隱公元年合書曰平王四十九年公即位今書曰元年是魯自改元矣春秋之書舊史也韓宣子於昭公二年聘魯當時夫子年十有三見魯之史已名春秋逮夫子約魯史仍名之曰春秋蓋深有取於春秋之名之義微寓乎尊王之意舊史則未必知之而夫子則深取之天子以年諸侯以時年雖魯國之僭而時乃天子之授時而天下諸侯之所同有夫子超古史而立法於元年而繫時焉以見春秋一統之義魯雖可以黜周之年終不可以黜周之時書春王正月春王二月春王三月則一年皆不可無時則人亦不可以一日而無王夫魯改元亂也今書春而繫以王見王者後天而奉天時書王而繫以正見王者猶能頒正朔於天下而諸侯必奉王者之正朔而後敢即位見魯亂而一王之法不亂也故書魯元年而名以春秋黜其年也不書周之紀年而書春者大周之一統也所以存周也觀春秋之二字即可以知尊王之義矣夏正得天百王所同夫子六經皆用夏正周之時即夏之時也顔淵問為邦夫子曰行夏之時此夫子作春秋筆法也嗚呼千載而下誰能明聖人之心哉元年春王正月嗚呼春秋書春王正月或云周正或云夏正千載而後諸儒未有能決之者若以周正紀事則四時十二月之次更錯迭紊而人時不復正矣曽謂春秋繫年月日時之書若此哉蓋夏正得天百王所同周家不㳂夏殷之舊以子月為嵗首天子開明堂受朝賀布政令於四方用是月也若乃敬授人時巡狩蒸享猶用夏焉汲冢周書云惟十有一月既南至亦如商書所載惟元祀十有二月而四時十二月之次未嘗改也特所尚之嵗首不同耳孰謂子月為周家之正月哉今按春秋書桓八年冬十月之雨雪僖十年之冬大雨雪或謂雪之失時為災不知雨雪政不在災異之例也水旱螟螽之變大饑無麥苖無麥禾之書聖人畏天災憂人窮也至矣書雨雪為嗣嵗之喜也此說得之詔南馬氏或曰子謂冬月之雨雪則春秋之常事不書雨雪於冬常事也此何以書曰二百四十二年而兩書雨雪其可以為常乎兩書有年則其他公私不足之年多兩書雨雪則其他隂陽錯繆之年多大抵古人所謂周多燠年之說不妄也若三月大震電大雨雪則春秋始以災異書矣僖公三十三年冬十二月隕霜不殺草或謂十月之隕霜不知十月隂氣始盛雖不殺草亦不為異季冬之月此為何時霜不殺草乃所以為異定公元年冬十月隕霜殺菽或謂十月無菽此八月之隕霜也不知中原之菽亦有晚穫者詩云嵗聿云暮采蕭穫菽則周家以十一月為嵗首而十月乃嵗聿云莫矣若謂十月無菽而獨八月有之則八月豈嵗莫之時乎考之春秋比比皆然何必如公羊左氏易時易月而後為是哉或又曰周官有正嵗正月之異子何以知正嵗之必在子而正月之必在寅曰正嵗直周嵗所尚之嵗首耳正月則四時十二月之次於嵗首無與焉豳詩之十月蟋蟀入我牀下嗟我婦子曰為改嵗於十月為將改嵗則正嵗之在子而正月之在寅明矣若謂正月之必在子則豳詩於周家正朔何故不稱正月而變其文謂一之日哉左氏謂正月為周正至於天䇿鶉奔之謡不能不用夏杜預専以周正釋春秋至於絳老人甲子之說不能不用夏則夏正乃萬古不易之時商周改之而不可改秦人去之而不可去左氏杜預諸儒欲不用而終不能不用夫子正恐後世疑周家之正月在冬之十一月故曰春王正月則春乃王之正月也夏正乃百王之所同也彼杜預之於春秋孔安國之於書鄭康成之於詩尚區區守周正之說吁惑矣吾不攻而自破矣夏正得天火心星也天子明堂之位也大火之行於天每嵗十一月十二月迭移于他次獨正月不違乎建寅蓋建寅之月乃天子坐明堂布政令於四方上奉天正下授人時皆是月也所以堯典劈頭便以敬授人時為第一義以建寅之月為萬世法正夫子作春秋意也天且不違而况於人乎獲麟解嗚呼獲麟二字三家以下言之愈多聖人之心愈不可得而見春秋奈何以獲麟終乎孔子適晉將濟河聞殺竇鳴犢而止為世亂讒勝禍之將及人也故春秋之作夫子有知我罪我之歎定哀之世微辭為多聖人危行言孫之意大不獲已也然則奈何終於獲麟或者以麟為瑞應不知麟之自出乃太平之瑞王者之應今不得深藏逺匿於山林之間而反因獲於虞人失物之性安得為瑞夫春秋書狩郎狩禚未有不志其地今但曰西狩則窮國以西淫獵所至雖麟不獲免焉麟仁獸也仁人君子之象也感獲麟而絶筆其聖人遁世無悶之意乎其聖人以天何言自處者乎故春秋止於獲麟吁此春秋一字之㫖而聖人千載之心騷云使麒麟可繫羈兮豈云異犬羊魯論一書聖人於門人問答之際詳於詩書執禮而略於易與春秋何也蓋易為窮理盡性至命之書不敢輕以授人曰五十以學易乃夫子之自道未嘗以是輕許學者也至於春秋乃一王之法不惟不敢輕以語人絶無單言片辭及於春秋之稱又何也考之二十篇之中皆春秋褒貶之大法意及之而辭不及之者筆削關於萬世之是非豫奪涉於當時之喜怒使其書出於夫子之時昭昭乎如揭日月而行則世之人將有甚於叔孫武叔者矣故春秋之授非私淑之門人不得以與於此也及觀孟子始益信余言之不謬孟子之論春秋事則齊桓晉文其文則史其義則孔子取之又繼之曰君子之澤五世而斬小人之澤五世而斬豫未得為孔子徒也豫私淑諸人也蓋孔子絶筆於哀公之十有四年下至孟子當平公之世已一百六十餘年若以三十年為一世而論孔子至是殆五世矣春秋所褒而謂之君子者其澤固至是而斬春秋所貶而謂之小人其澤亦至是而斬雖有子孫服屬已盡其好惡消其是非定春秋之書可以出矣孟子猶不敢以斯道為己任則曰豫未得為孔子徒也但以春秋之學私淑之人也世皆以左丘明親受經於聖人不知左氏之傳皆事迹耳而春秋褒貶大義惟孟子之得其正傳也觀孟子所謂春秋無義戰彼善於此之語此非長於春秋乎春秋天子之事之語此非深得於春秋者乎則春秋為夫子身後之書惟孟子之得其正傳也韓昌黎答張籍亦以言孔氏之作春秋也不敢公傳道之口授弟子至於後世其書出焉所以慮患之道微矣如斯言也於獲麟之辭豈不信哉論左氏余嘗論三傳之異同而獨於左氏惜焉公榖但釋經而已春秋所無公榖不可得而有春秋所有公榖亦不可得而無左氏或先經以始事或後經以終義或依經以辨理或錯經以合義其事與辭過公榖逺矣獨惜春秋所有者或無而無者反者抑揚褒貶之義猶未之見焉齊桓晉文其功誠足以稱伯必起其侵曹侵蔡伐衛之由則有功者易以見疑楚靈之暴晉三郤之専其罪皆足以殺身必起其見殺之由則為惡者辭以自解滅談則曰談不禮焉滅遂則曰遂人不至滅舒鳩則曰舒鳩卒叛大之加小何患無辭必起其見滅之由則滅人之國者皆可以無罪考傳之顛末大抵類此乃若言醫取秦言術取晉卜筮占候相人之法事事竒中借曰術家之流勿論至於君子覘人亦曰欒氏先亡趙孟不復年今兹宋公與叔孫皆將死覘人之國亦曰虞不臘虢不五稔楚不十年若隂有鬼神發之者吾是以未敢深信也蓋左氏之長博采諸國之記而為之傳㳂流泝源使學春秋者有所證左氏之失張本春秋之事而為之辭枝牽葉蔓使學春秋者易以疑陳桓公尚在而先舉桓公之諡鄭泄駕吳諸樊已死而尚見泄駕諸樊之人此皆左氏浮誇之過而不自覺且其載醫巫卜筮占候相人之法於聖經何與哉雖然論聖人之謹嚴則左氏於春秋為有過論公羊之俗榖梁之短則左氏於春秋為有功宰咺歸賵二傳未有載惠公仲子之詳者左氏獨言之吾是以知仲子之為妾鄭伯克段二傳未有以發祭仲子封之言者左氏獨詳之吾是以知鄭伯之心此類有功於天下後世者不少微左氏吾何以知春秋哉余又謂左氏之誇固可惜杜氏之諛深可罪杜之釋傳阿媚取容有不可曉動曰經誤預聖門之罪人左氏之面友也余亦嗜左氏者人知杜氏之諛則知吾言之忠春秋提綱卷十
