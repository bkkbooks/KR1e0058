body:
  text: 春秋提綱卷八宋陳則通撰盟會門內大夫及外大夫盟會例文二年公孫敖會晉士縠于垂隴八年公子遂會晉趙盾盟于衡雍十有一年夏叔仲彭生會晉郤缺于承筐宣十有五年仲孫蔑會齊髙固于無婁成二年六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績齊侯使國佐如師及國佐盟于袁婁五年夏叔孫僑如會晉荀首于榖十有五年冬十有一月叔孫僑如會晉士變齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離十有六年十有二月乙丑季孫行父及晉郤犫盟于扈襄二年秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人小邾人于戚遂城虎牢三年戊寅叔孫豹及諸侯之大夫及陳袁僑盟五年仲孫蔑衛孫林父會吳于善道八年季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘十有四年季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚十有六年公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁戊寅大夫盟十有九年叔孫豹會晉士丐于柯二十年仲孫速會莒人盟于向二十有七年叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋秋七月辛巳豹及諸侯之大夫盟于宋二十有九年仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫假曹人莒人滕人薛人小邾人城杞昭元年叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢十有一年季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憗二十有五年叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父二十有七年晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈三十有一年季孫意如會荀躒于適歷三十有二年仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周嗚呼文武不興而周道衰桓文不作而伯業微隱桓之春秋諸侯紛紛莫之適從自莊十三年以迄于僖之末主諸侯之權者在伯主自文元年以迄襄之末盜伯主之權者在大夫自襄之末以迄于哀之獲麟姦伯主之權者在吳楚文公以前有公及外大夫盟者有內大夫及諸侯盟者此皆大夫専政之漸而內外大夫無交相盟會者大夫交相盟會則天下之伯不在諸侯而在大夫矣翟泉一會罅隙已開晉魯二君俱怠於政晉以處父士縠趙盾當諸侯魯以公孫敖公子遂當諸侯春秋世道為之一變列國大夫相視而起垂隴之盟晉魯二卿宛然與諸侯講玉帛之好當時大夫之會猶有諸侯未聞大夫専敵大夫者襄仲趙盾之於衡雍叔仲卻缺之於承筐孟獻子髙固之於無婁榖之會叔孫僑如之敵荀首扈之會季孫文子之敵卻犫柯之會叔孫穆子之敵士丐此則大夫之敵大夫者矣然不過兩國之大夫也猶未見其大夫盜伯主之權者也蓋自趙盾以諸侯伯以一大夫敵諸侯天下之勢已向於大夫卻克以大夫伯以一大夫敵衆大夫天下之勢始成乎大夫文七年之盟扈經不列諸侯之序不出趙盾之名志春秋世變之一變也十四年新城之同同授趙盾以政始列諸侯之序始出趙盾之名而盾始得以伯諸侯矣愚嘗論晉卿世伯未嘗不倣召陵城濮之故事特桓文用此以制荆蠻晉大夫用此以制中國耳諸侯會于新城之嵗趙盾納捷災于邾至其城下弗納而還凛然有召陵整兵不犯之意雖小大之不侔皆所以示天下諸侯義也専盟専會専伐専救愚㺯晉國之權于掌股之上桃園之事晉國晏然而不搖諸侯畏之而不動伯權之屬盾久矣趙盾侵陳於宣之六年明年晉侯親為黑壤之會越二年又親為扈之會則趙盾之已卒也盾之卒晉人雖能收其權而不屬之大夫不能不縱其權而屬之荆蠻楚盟于辰陵晉會于攢函顛之倒之莫此為甚趙盾忠不足而勛有餘行不及而才過之使趙盾尚在邲之役必不至此蓋前此有盾以伯今則無盾以伯也宣子能為中國之輕重如此哉雖然趙盾以諸侯伯天下之勢雖向乎大夫而猶未成乎大夫盾沒晉大夫不敢大會諸侯皆得以大會其大夫則郤克其首也天下之勢始成乎大夫矣晉自邲之敗舍楚而謀齊郤克承乃祖之烈其族又大銜一笑之忿興四國之師以七大夫戰一齊侯若以匹敵齊之君猶晉之君也敗在齊侯辱在晉君甚矣鞍之役非晉之福也城濮之役一戰而勝則伯在晉侯鞍之役一戰而勝則伯在大夫晉大夫強而列國之大夫強迄春秋不可復制矣雖然是役也及國佐盟于袁婁七卿俱盟而所以受盟者一國佐也猶未有一大夫盟列國之大夫也未有一大夫會列國之大夫也後此蟲牢馬陵蒲戚之盟盟在晉侯權在大夫大夫有其權未見有其事也成十六年將為鄢陵之戰則十五年先為鍾離之會士燮之賢不容不處於危疑之地七國大夫自會而又會吳入春秋來大夫所未有之事會江人黃人于貫者齊桓之伯也會秦人于溫者晉文之伯也會吳于鍾離者晉大夫之伯也伯業愈降而愈下世道愈降而愈趨也悼公雖賢其齒猶未不能不倚大夫以為重虛朾首會我以孟孫來齊以崔杼會習以為常故步未改二戚之會荀罃主之大合諸侯之老為虎牢之城此與公會齊宋鄭曹于柳而下書城楚丘公會齊宋陳衛于鹹而下書城緣陵者同一例苐春秋於虎牢之城而書遂則罪大夫之専伯權也然自鍾離以後大夫専列國之會而未見其専列國之盟也雞澤之役諸侯既盟而復使大夫盟諸侯自此始以盟會授大夫矣邢丘之會魯國之君不得與向之會魯之二卿皆得從戚之會舍君而臣是助此皆大夫黨大夫之效也悼公雖有五會三駕之績大抵以大夫之伯分之悼公沒吾復奚望邪郤克怒齊而盟袁婁荀罃怒齊而會戚荀偃怒齊而盟湨梁雖諸侯之在會不顧也列國盟會惟大夫之喜怒是從尚謂晉有君乎雞澤之役書諸侯之大夫盟罪在諸侯也罪諸侯與大夫以伯也湨梁之役書大夫盟罪在大夫也罪大夫奪伯主之伯也諸侯以伯權與大夫則大夫以伯權與荆楚宋之盟大勢所趨可得已乎向戌善于文子又善于子木所以媒南北之好趙武善於屈建所以尸西門之盟大夫既得與列國之大夫盟遂敢與荆楚之大夫盟春秋之義臣無竟外之交何得爾也虢之會再讀舊書申之會盡有諸侯欲外服不姦伯主之權可得已乎鄫衍黃池識者有以覘其他日淳于之城奴諸侯以事母家扈之會適歷之會黨賊臣以逐君父大夫之罪春秋所誅厥憗之會謀滅國者大夫也黃父之會謀納王者大夫也大夫之功春秋所録嗚呼此亦奚功春秋正以悲天下之無諸侯也成周之城魏舒南面則三家分晉之事作矣大夫盟會之筆絶矣子不觀春秋之筆乎楚於宋魯之盟不書爵秦於伯主之盟沒君臣吳書會而不書盟越終春秋不書會此聖人定內服外服之分也諸侯之盟則如葵丘踐土之法諸侯及大夫盟則如翟泉新城之法大夫自盟或序諸侯或總諸侯以臨之此聖人正諸侯大夫之分也嗚呼春秋之筆豈不深切著明矣哉列國世子朝聘會盟侵伐例桓九年曹伯使其世子射姑來朝僖七年秋七月公會齊侯宋公陳世子款鄭世子華盟于寧母八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮宣十有八年春晉侯衛世子臧伐齊成十有五年癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚襄五年叔孫豹鄫世子巫如晉公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳九年冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭同盟于戲十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭十有一年公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚嗚呼諸侯之適子誓於天子則曰世子周制也公之子視侯伯而執圭侯伯之子視子男而執璧子男之子與未誓者執皮帛以朝會焉其賔之則以上卿之禮亦周制也諸侯老者疾者迫於朝聘會盟征伐之期有天子之命不敢後是以其世子來春秋諸侯不聞天子之命是從奔走強令不敢寧居跋涉蒙犯已不能往則使世子代之曹伯終生疾而使世子射姑朝宋公固疾而使世子成會衛侯速疾而使世子臧代夫世子以朝夕視君膳奉社稷之粢盛者也大位姦之窺也危病邪之伺也其忍舍君父而他之乎使蔡般許止類有欲速之志則有由然也齊靈怙其強大耻為晉役當悼公五會三駕之年諸侯麇至齊世子光實來于戲以前凡有盟會猶尾於諸侯戍虎牢盟亳城北會蕭魚胡為躐填於諸小國之上陳款鄭華在齊桓之會者不聞至此不思世子既同於諸侯齊君將置之何所晉悼方明盍亦為人父子計光列諸侯齊人不以藉口乎嗚呼吾讀春秋諸侯世子之序而甚有感於周官班爵之法公及外大夫盟會例隱元年及宋人盟于宿八年公及莒人盟于浮來桓十有四年鄭伯使其弟語來盟莊九年公及齊大夫盟于蔇二十有三年及齊髙傒盟于防閔二年齊髙子來盟僖十有九年會陳人蔡人楚人鄭人盟于齊二十有五年公會衛子莒慶盟于洮二十有六年公會莒子衛寧速盟于向二十有九年公會王人晉人宋人齊人陳人蔡人盟于翟泉文二年及晉處父盟七年公會諸侯晉大夫盟于扈十年及蘇子盟于女栗十有四年公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾同盟于新城十有五年宋司馬華孫來盟宣七年衛使使孫良夫來盟成二年公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀三年丙午及荀庚盟丁未及孫良夫盟十有一年己丑及郤犫盟襄七年壬戌及孫林父盟十有五年及向戌盟于劉二十有六年公會晉人鄭良霄宋人曹人于澶淵嗚呼春秋書諸侯之盟譏之也諸侯及大夫盟譏之又譏也在諸侯則譏在魯則諱諱魯所以尊魯也又孰知諱魯所以譏魯也春秋書公於伯主之盟例不書及而書會以其伯主也伯主欲而我從之也公於大夫盟例不書會而書及以其我君也我君欲而大夫從之也始會幽而沒公則魯為之諱再會幽而書公則魯不為之諱此天下有伯而諸侯之始合也自幽以後凡伯主之大盟皆書會至臯鼬之盟始書及則天下之無伯而諸侯之始散也公始得以行其所欲也或曰公會伯主盟則從伯主之欲如長樗之盟尚有我君欲而伯主從之者公及大夫盟則從我公之欲其間豈無大夫欲之公不得已而從之者乎曰有之矣浮來之盟公欲平紀也蔇之盟公欲納糾也蜀之盟公欲完魯也春秋書公則欲之者公也宿之盟宋人主之也防之盟髙徯主之也晉處父之盟處父主之也荀庚郤犫良夫林父之盟則四大夫主之也春秋沒公則欲之者大夫也主在大夫而沒公所以深諱之也猶書及者若我公之所欲而不與其從大夫之欲也沒公則見其欲盟之非吾公也若夫有諸侯在焉或不書及而書會無傷也齊之盟必諸侯在而書會而沒公者諱盟楚之始也翟泉之盟有王子在而書會而沒公者諱盟列國大夫之始也盟洮向而書會一大夫也而一莒衛之君也盟扈盟新城而書會一大夫也而衆列國之君也有諸侯在盟而書會無傷也非諸侯而但其大夫雖伯主之貴卿不與其欲之矣春秋辨貴賤之等而明隆殺之分也不然春秋書公於大夫之盟例書及豈皆公之所欲而非大夫之所欲者邪吾故曰內書公則權在公也內沒公則權在大夫也外稱使則權在彼國之君也鄭伯使弟語衛侯使良夫之類是也此兩國前定之辭也外不稱使則權亦在彼國之大夫也齊髙子宋華孫之類是也此臨期定盟之辭也春秋皆不書及者彼之納盟於我者也雖然美惡之事褒貶之法則有春秋在也內大夫及諸侯盟會例桓十有一年柔會宋公陳侯蔡叔盟于折莊十有九年公子結媵陳人之婦于鄄遂及齊侯宋公盟僖三年公子友如齊蒞盟文元年公孫敖會晉侯于戚二年公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴七年公孫敖如莒蒞盟十有六年季孫行父會齊侯于陽榖公子遂及齊侯盟于郪丘宣十有四年公孫歸父會齊侯于榖十有五年公孫歸父會楚子于宋成元年臧孫許及晉侯盟于赤棘十有八年仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾襄八年季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘昭七年叔孫婼如齊蒞盟九年春叔弓會楚子于陳十有一年仲孫貜會邾子盟于祲祥定三年仲孫何忌及邾子盟于拔十有一年叔還如鄭蒞盟哀二年癸巳叔孫州仇仲孫何忌及邾子盟于句繹嗚呼天有十日人有十等諸侯不可以抗王室猶大夫不可以抗諸侯公及大夫盟春秋率多諱之嗚呼豈春秋特為魯諱哉魯人為之諱春秋亦從為之諱抑不特魯人以此諱之也諸侯亦以此諱之也吾觀內大夫盟外諸侯未嘗不感於春秋之世變焉桓莊僖文之大夫不可以敵諸侯諸侯猶以為愧宣成襄之大夫皆可以敵諸侯諸侯反以為喜昭定哀之大夫皆可以加小國之君小國之君深以為畏其始也以為愧其後也以為喜又其後也以為畏大夫之勢寖長寖大而莫之遏也在禮卿不得會公侯會伯子男春秋之初古風未盡澌絶人心猶有羞惡一犯非禮則顔忸怩而心不寧內大夫未有盟諸侯而盟諸侯者自柔始公亦自知其無禮於宋也親往五會以謝宋竟不一釋憾於宋甚則舍玉帛而事干戈柔之盟所以致宋之戰也公子結媵陳人之婦則禮失之卑盟齊宋之君則禮失之抗盟歃未乾西鄙蒙伐大夫出疆有安社稷利民人者専之吾見専之害而未見専之利也雖然折之盟有陳侯敵宋公而柔不免得罪於宋鄄之盟有宋公敵齊侯而結未免得罪於齊我大夫未有特會諸侯者也特會諸侯者自敖始讀春秋至此冝大夫之可以敵晉侯也會戚之明年我公如晉晉使處父盟公以報之處父盟公魯以為諱則敖之會晉晉亦以為諱明矣內大夫之列於諸侯始於公孫敖外大夫之列於諸侯始於士縠此特晉魯二君飬患以為此諸侯未必以為是也陽榖之會季孫文子將求盟于齊也而弗及盟此君也彼大夫也齊弗肯以及我也此時實有疾齊若不聞受襄仲之賂然後受郪丘之盟既盟而悔臨我以兵又以聲我襄仲抗盟之罪不得魯君之盟榖不止也大夫抗盟諸侯皆有羞惡之心而君臣冠履之分未至蕩然也宣公折節事齊公盟公會而公往朝之末年鼓舞少倦然後使我歸父往城濮以來公未嘗往會于楚公未嘗往盟于楚事勢張皇然後使我歸父會重則以我公行輕則以大夫往大夫之權未張也晉人失魯者十有六年斷道之盟喜於得魯赤棘之役魯以歸父而疑晉魯也請盟晉也受之惟以得魯為喜不暇以盟大夫為疑沙隨而君辱苕丘而臣辱晉人于是再失魯矣郤犫告於晉曰魯之有季孟猶晉之有欒范也政令于是乎成自此晉人不敢輕視魯之大夫虛朾之盟我仲孫往會晉人喜魯卿之再來不暇以魯君為請則僑如之言正以譖獻子也反以譽獻子也借曰是盟魯有仲孫齊有崔杼匹也邢丘之役我公在晉晉侯舍君而臣是會借曰齊宋衛之大夫可以敵武子然魯君不在猶可藉口有魯君在而辱使其大夫寡君懼矣吾然後知晉得魯君反以為常得魯卿反以為喜也盟宋以後公不從諸侯盟者十有八年平丘以後公不從諸侯盟者二十有三年祲祥之盟拔之盟魯惟從事於一邾而已惟大夫書會書及而已襄十一年作三軍而公室分為三昭五年舍中軍而公室分為四貪婪無厭浸及鄰國漷東沂西之田蠶食而穫取之猶未快也至其國要其君邾不得已低首下心而就之盟雖列國之卿當小國之君固周制也始以三卿伐之繼以二卿盟之無乃陵小乎怒於室而色於市市人亦望而畏之者也或曰子論大夫之盟諸侯而春秋世變猶未詳也曰文七年如莒蒞盟昭七年如齊蒞盟修鄰好也於春秋之世變無與也季友蒞盟事齊之始也敖會于戚事晉之始也遂盟郪丘舍晉事齊之始也歸父會榖舍齊兩事晉楚之始也叔弓會陳舍楚兩事晉吳之始也叔還蒞盟背晉事齊及事吳之始也嗚呼春秋世變於此乎起亦於此乎止也春秋提綱卷八
